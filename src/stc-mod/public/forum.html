<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>交流平台 - SillyTavern</title>
    <link rel="stylesheet" href="css/fontawesome.min.css">
    <link rel="stylesheet" href="css/solid.min.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
/* ── Reset & Base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans',sans-serif;background:#141414;color:#dcdcd2;min-height:100vh}

/* ── Forum Container ── */
.forum-container{max-width:1200px;margin:0 auto;padding:20px}

/* ── Header ── */
.forum-header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:15px;padding:30px;margin-bottom:30px;color:#fff;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.header-content{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
.forum-title{font-size:2rem;margin:0;display:flex;align-items:center;gap:12px}
.header-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.user-info{display:flex;align-items:center;gap:12px}
.welcome-text{font-size:1rem}
.login-prompt{display:flex;align-items:center;gap:10px}

/* ── Controls ── */
.forum-controls{background:rgba(255,255,255,.06);backdrop-filter:blur(10px);border-radius:15px;padding:20px;margin-bottom:30px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;border:1px solid rgba(255,255,255,.08)}
.search-section{flex:1;min-width:280px}
.search-box{position:relative;display:flex;align-items:center}
.search-box i{position:absolute;left:14px;color:rgba(220,220,210,.5);z-index:1;pointer-events:none}
.search-box input{width:100%;padding:11px 14px 11px 42px;border:2px solid rgba(255,255,255,.12);border-radius:25px;font-size:.95rem;background:rgba(0,0,0,.3);color:#dcdcd2;font-family:inherit;outline:none;transition:all .3s}
.search-box input::placeholder{color:rgba(220,220,210,.5)}
.search-box input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.15)}
.filter-section{display:flex;gap:12px}
select.filter-select{padding:10px 14px;border:2px solid rgba(255,255,255,.12);border-radius:10px;background:#1c1830;color:#dcdcd2;font-size:.95rem;cursor:pointer;outline:none;font-family:inherit;transition:border-color .3s}
select.filter-select option{background:#1c1830;color:#dcdcd2}
select.filter-select:focus{border-color:#667eea}

/* ── Articles grid ── */
.articles-container{min-height:400px}
.articles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px;margin-bottom:30px}
.article-card{background:rgba(255,255,255,.05);border-radius:15px;overflow:hidden;border:1px solid rgba(255,255,255,.08);box-shadow:0 5px 20px rgba(0,0,0,.3);transition:all .3s ease;cursor:pointer}
.article-card:hover{transform:translateY(-5px);box-shadow:0 12px 32px rgba(0,0,0,.5);border-color:rgba(102,126,234,.3)}
.article-header{padding:20px;border-bottom:1px solid rgba(255,255,255,.07)}
.article-title{font-size:1.15rem;font-weight:700;margin:0 0 10px;color:#e8e0ff;line-height:1.4}
.article-meta{display:flex;align-items:center;gap:14px;font-size:.82rem;color:rgba(220,220,210,.55);flex-wrap:wrap}
.article-meta span{display:flex;align-items:center;gap:4px}
.article-content-preview{padding:18px 20px}
.article-excerpt{color:rgba(220,220,210,.7);line-height:1.6;margin-bottom:12px;font-size:.9rem}
.article-tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{background:rgba(102,126,234,.2);color:#a0b0ff;padding:3px 10px;border-radius:12px;font-size:.75rem;border:1px solid rgba(102,126,234,.3)}
.article-footer{padding:14px 20px;background:rgba(0,0,0,.2);display:flex;justify-content:space-between;align-items:center}
.article-stats{display:flex;gap:14px;font-size:.85rem;color:rgba(220,220,210,.55)}
.article-stats span{display:flex;align-items:center;gap:4px}
.article-category{background:#667eea;color:#fff;padding:4px 12px;border-radius:12px;font-size:.75rem;font-weight:600}

/* ── Empty / Loading ── */
.loading-indicator,.no-articles{text-align:center;padding:60px 20px;color:rgba(220,220,210,.5)}
.loading-indicator i{font-size:2rem;margin-bottom:14px;color:#667eea;display:block}
.no-articles i{font-size:3rem;margin-bottom:18px;color:rgba(102,126,234,.3);display:block}
.no-articles h3{margin:0 0 8px;font-size:1.4rem;color:#dcdcd2}

/* ── Pagination ── */
.pagination{display:flex;justify-content:center;align-items:center;gap:16px;margin-top:28px}
.page-info{font-size:.9rem;color:rgba(220,220,210,.6)}

/* ── Buttons ── */
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .3s;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(102,126,234,.4)}
.btn-secondary{background:rgba(0,0,0,.35);color:#dcdcd2;border:2px solid rgba(255,255,255,.12)}
.btn-secondary:hover{background:rgba(0,0,0,.5);border-color:rgba(255,255,255,.25);transform:translateY(-1px)}
.btn-outline{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.4)}
.btn-outline:hover{background:rgba(255,255,255,.15)}
.btn-danger{background:rgba(220,53,69,.15);color:#ff6b7a;border:1px solid rgba(220,53,69,.3)}
.btn-danger:hover{background:rgba(220,53,69,.28);transform:translateY(-2px)}
.btn-sm{padding:6px 12px;font-size:.82rem}
.btn-liked{color:#ff6b6b!important;border-color:#ff6b6b!important;background:rgba(255,107,107,.12)!important}
/* Outline heart via clip-path trick when regular.css is unavailable */
.btn-heart-outline .fa-heart{opacity:.45}

/* ── Modal ── */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(6px)}
.modal-content{background:#1a1628;border-radius:15px;max-width:620px;width:100%;max-height:90vh;overflow-y:auto;border:1px solid rgba(255,255,255,.1);box-shadow:0 24px 60px rgba(0,0,0,.7);scrollbar-width:thin;scrollbar-color:rgba(102,126,234,.3) transparent}
.modal-content::-webkit-scrollbar{width:5px}
.modal-content::-webkit-scrollbar-thumb{background:rgba(102,126,234,.3);border-radius:4px}
.modal-large{max-width:900px}
.modal-header{padding:22px 28px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center}
.modal-header h2{margin:0;color:#e8e0ff;font-size:1.2rem}
.modal-close{background:none;border:none;font-size:1.4rem;color:rgba(220,220,210,.5);cursor:pointer;padding:4px 8px;border-radius:5px;transition:all .3s;line-height:1}
.modal-close:hover{background:rgba(255,255,255,.08);color:#dcdcd2}
.modal-body{padding:28px}

/* ── Form ── */
.form-group{margin-bottom:18px}
.form-group label{display:block;margin-bottom:7px;font-weight:600;color:rgba(220,220,210,.8);font-size:.9rem}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 14px;border:2px solid rgba(255,255,255,.1);border-radius:8px;font-size:.95rem;transition:all .3s;background:#120f20;color:#dcdcd2;font-family:inherit;outline:none}
.form-group select{cursor:pointer;background:#120f20}
.form-group select option{background:#120f20;color:#dcdcd2}
.form-group input::placeholder,.form-group textarea::placeholder{color:rgba(220,220,210,.4)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.12)}
.form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:24px}

/* ── Rich Editor ── */
.rich-editor-container{border:2px solid rgba(255,255,255,.1);border-radius:8px;overflow:hidden;transition:all .3s}
.rich-editor-container:focus-within{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.12)}
.rich-editor-toolbar{background:#0f0d1a;padding:10px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;flex-wrap:wrap;gap:4px}
.toolbar-btn{background:none;border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:5px 9px;cursor:pointer;font-size:.85rem;color:#dcdcd2;transition:all .2s;font-family:inherit}
.toolbar-btn:hover{background:rgba(102,126,234,.2);border-color:#667eea;color:#a0b0ff}
.toolbar-btn.active{background:#667eea;color:#fff;border-color:#667eea}
.toolbar-separator{width:1px;background:rgba(255,255,255,.1);margin:0 4px}
.rich-editor-content{min-height:200px;padding:14px;outline:none;line-height:1.7;color:#dcdcd2;background:#120f20}
.rich-editor-content:empty:before{content:attr(placeholder);color:rgba(220,220,210,.35)}
.rich-editor-content h1,.rich-editor-content h2,.rich-editor-content h3{color:#e8e0ff;margin:.5em 0}
.rich-editor-content a{color:#a0b0ff}
.rich-editor-content ul,.rich-editor-content ol{padding-left:1.5em}

/* ── Article Detail ── */
.article-detail{margin-bottom:24px}
.detail-meta{display:flex;gap:16px;flex-wrap:wrap;font-size:.85rem;color:rgba(220,220,210,.55);margin-bottom:14px}
.detail-meta span{display:flex;align-items:center;gap:5px}
.detail-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.detail-content-body{color:#dcdcd2;line-height:1.8;font-size:.95rem;padding:20px;background:rgba(0,0,0,.2);border-radius:10px;border:1px solid rgba(255,255,255,.06)}
.detail-content-body h1,.detail-content-body h2,.detail-content-body h3{color:#e8e0ff;margin:.8em 0 .4em}
.detail-content-body a{color:#a0b0ff}
.detail-content-body ul,.detail-content-body ol{padding-left:1.5em}
.article-actions{display:flex;gap:12px;margin-top:18px;padding-top:18px;border-top:1px solid rgba(255,255,255,.08);flex-wrap:wrap}

/* ── Comments ── */
.comments-section{border-top:2px solid rgba(255,255,255,.08);padding-top:26px;margin-top:4px}
.comments-section>h3{margin:0 0 18px;color:#c8b8ff;font-size:1.05rem;display:flex;align-items:center;gap:8px}
.comment-form-area{margin-bottom:24px}
.comment-form-area textarea{width:100%;padding:14px;border:2px solid rgba(255,255,255,.1);border-radius:8px;resize:vertical;margin-bottom:12px;font-family:inherit;background:#120f20;color:#dcdcd2;outline:none;transition:border-color .3s;font-size:.92rem}
.comment-form-area textarea::placeholder{color:rgba(220,220,210,.4)}
.comment-form-area textarea:focus{border-color:#667eea}
.comment-form-area .form-actions{margin-top:0}
.comments-list{margin-top:8px}
.comment{background:rgba(255,255,255,.04);border-radius:10px;padding:18px;margin-bottom:14px;border:1px solid rgba(255,255,255,.06)}
.comment[data-level]:not([data-level="0"]){border-left:2px solid rgba(102,126,234,.35);background:rgba(0,0,0,.15)}
.comment-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.comment-author{font-weight:700;color:#a0b0ff;font-size:.88rem}
.comment-date{font-size:.8rem;color:rgba(220,220,210,.4)}
.comment-actions-bar{display:flex;gap:6px;margin-left:auto}
.comment-reply-btn,.comment-delete-btn{background:none;border:none;color:rgba(220,220,210,.5);font-size:.8rem;cursor:pointer;padding:3px 8px;border-radius:4px;transition:all .2s;display:flex;align-items:center;gap:4px;font-family:inherit}
.comment-reply-btn:hover{background:rgba(102,126,234,.15);color:#a0b0ff}
.comment-delete-btn:hover{background:rgba(220,53,69,.15);color:#ff6b7a}
.comment-content-text{line-height:1.65;color:#dcdcd2;font-size:.9rem;white-space:pre-wrap;word-break:break-word}
.reply-form-area{margin-top:12px;padding:14px;background:rgba(0,0,0,.25);border-radius:8px;border-left:3px solid #667eea;display:none}
.reply-form-area.open{display:block}
.reply-form-area textarea{width:100%;padding:10px 12px;border:1px solid rgba(255,255,255,.1);border-radius:6px;font-size:.88rem;resize:vertical;font-family:inherit;background:#0f0d1a;color:#dcdcd2;outline:none;transition:border-color .3s}
.reply-form-area textarea:focus{border-color:#667eea}
.reply-form-area textarea::placeholder{color:rgba(220,220,210,.4)}
.reply-actions{display:flex;gap:8px;margin-top:8px}
.no-login-comment{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:16px;text-align:center;color:rgba(220,220,210,.55);display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;font-size:.9rem}
.no-login-comment a{color:#a0b0ff;text-decoration:none}

/* ── Responsive ── */
@media(max-width:768px){
    .header-content{flex-direction:column;text-align:center}
    .forum-title{font-size:1.6rem;justify-content:center}
    .forum-controls{flex-direction:column;align-items:stretch}
    .search-section{min-width:auto}
    .filter-section{justify-content:center}
    .articles-grid{grid-template-columns:1fr}
    .modal-content{margin:10px;max-width:none}
    .modal-body{padding:18px}
}
    </style>
</head>
<body>
<div class="forum-container">

    <!-- Header -->
    <header class="forum-header">
        <div class="header-content">
            <h1 class="forum-title">
                <i class="fa-solid fa-comments"></i>
                交流平台
            </h1>
            <div class="header-actions">
                <div class="user-info" id="userInfo" style="display:none">
                    <span class="welcome-text">欢迎，<span id="userName"></span></span>
                    <button class="btn btn-primary" onclick="createArticle()">
                        <i class="fa-solid fa-plus"></i> 发布文章
                    </button>
                </div>
                <div class="login-prompt" id="loginPrompt">
                    <span>请先登录后发布文章</span>
                    <a href="/login" class="btn btn-secondary">登录</a>
                </div>
                <a href="/" class="btn btn-outline">
                    <i class="fa-solid fa-house"></i> 返回主页
                </a>
            </div>
        </div>
    </header>

    <!-- Search & Filter -->
    <div class="forum-controls">
        <div class="search-section">
            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索文章...">
            </div>
        </div>
        <div class="filter-section">
            <select id="categoryFilter" class="filter-select">
                <option value="">全部分类</option>
                <option value="tutorial">教程</option>
                <option value="discussion">讨论</option>
                <option value="announcement">公告</option>
                <option value="question">问答</option>
                <option value="showcase">展示</option>
            </select>
            <select id="sortFilter" class="filter-select">
                <option value="latest">最新发布</option>
                <option value="popular">最受欢迎</option>
                <option value="views">最多浏览</option>
            </select>
        </div>
    </div>

    <!-- Article List -->
    <main class="articles-container">
        <div class="articles-grid" id="articlesGrid"></div>
        <div id="loadingIndicator" class="loading-indicator" style="display:none">
            <i class="fa-solid fa-spinner fa-spin"></i>
            <span>加载中...</span>
        </div>
        <div id="noArticles" class="no-articles" style="display:none">
            <i class="fa-solid fa-newspaper"></i>
            <h3>暂无文章</h3>
            <p>还没有用户发布文章，快来发布第一篇吧！</p>
        </div>
    </main>

    <!-- Pagination -->
    <div class="pagination" id="pagination" style="display:none">
        <button class="btn btn-outline" id="prevPage" onclick="previousPage()">
            <i class="fa-solid fa-chevron-left"></i> 上一页
        </button>
        <span class="page-info" id="pageInfo">第 1 页，共 1 页</span>
        <button class="btn btn-outline" id="nextPage" onclick="nextPage()">
            下一页 <i class="fa-solid fa-chevron-right"></i>
        </button>
    </div>
</div>

<!-- Publish Article Modal -->
<div id="articleModal" class="modal" style="display:none">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h2 id="articleModalTitle">发布新文章</h2>
            <button class="modal-close" onclick="closeArticleModal()"><i class="fa-solid fa-times"></i></button>
        </div>
        <div class="modal-body">
            <form id="articleForm">
                <div class="form-group">
                    <label>标题 *</label>
                    <input type="text" id="articleTitle" required placeholder="请输入文章标题">
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <select id="articleCategory">
                        <option value="discussion">讨论</option>
                        <option value="tutorial">教程</option>
                        <option value="question">问答</option>
                        <option value="showcase">展示</option>
                        <option value="announcement">公告</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>标签（逗号分隔）</label>
                    <input type="text" id="articleTags" placeholder="例如：技巧,教程,角色扮演">
                </div>
                <div class="form-group">
                    <label>内容 *</label>
                    <div class="rich-editor-container">
                        <div class="rich-editor-toolbar">
                            <button type="button" class="toolbar-btn" data-command="bold" title="粗体"><i class="fa-solid fa-bold"></i></button>
                            <button type="button" class="toolbar-btn" data-command="italic" title="斜体"><i class="fa-solid fa-italic"></i></button>
                            <button type="button" class="toolbar-btn" data-command="underline" title="下划线"><i class="fa-solid fa-underline"></i></button>
                            <button type="button" class="toolbar-btn" data-command="strikeThrough" title="删除线"><i class="fa-solid fa-strikethrough"></i></button>
                            <div class="toolbar-separator"></div>
                            <button type="button" class="toolbar-btn" data-command="insertUnorderedList" title="无序列表"><i class="fa-solid fa-list-ul"></i></button>
                            <button type="button" class="toolbar-btn" data-command="insertOrderedList" title="有序列表"><i class="fa-solid fa-list-ol"></i></button>
                            <div class="toolbar-separator"></div>
                            <button type="button" class="toolbar-btn" data-command="createLink" title="插入链接"><i class="fa-solid fa-link"></i></button>
                            <button type="button" class="toolbar-btn" id="insertImageBtn" title="插入图片"><i class="fa-solid fa-image"></i></button>
                            <div class="toolbar-separator"></div>
                            <button type="button" class="toolbar-btn" data-command="formatBlock" data-value="h1" title="大标题">H1</button>
                            <button type="button" class="toolbar-btn" data-command="formatBlock" data-value="h2" title="中标题">H2</button>
                            <button type="button" class="toolbar-btn" data-command="formatBlock" data-value="h3" title="小标题">H3</button>
                            <div class="toolbar-separator"></div>
                            <button type="button" class="toolbar-btn" data-command="justifyLeft" title="左对齐"><i class="fa-solid fa-align-left"></i></button>
                            <button type="button" class="toolbar-btn" data-command="justifyCenter" title="居中"><i class="fa-solid fa-align-center"></i></button>
                            <button type="button" class="toolbar-btn" data-command="justifyRight" title="右对齐"><i class="fa-solid fa-align-right"></i></button>
                        </div>
                        <div class="rich-editor-content" id="articleContent" contenteditable="true" placeholder="请输入文章内容..."></div>
                        <input type="file" id="imageUpload" accept="image/*" style="display:none">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeArticleModal()">取消</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-paper-plane"></i> 发布文章
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Article Detail Modal -->
<div id="articleDetailModal" class="modal" style="display:none">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h2 id="articleDetailTitle"></h2>
            <button class="modal-close" onclick="closeArticleDetailModal()"><i class="fa-solid fa-times"></i></button>
        </div>
        <div class="modal-body">
            <div class="article-detail">
                <div class="detail-meta">
                    <span><i class="fa-solid fa-user"></i><span id="articleDetailAuthor"></span></span>
                    <span><i class="fa-solid fa-calendar"></i><span id="articleDetailDate"></span></span>
                    <span><i class="fa-solid fa-tag"></i><span id="articleDetailCategory"></span></span>
                    <span><i class="fa-solid fa-eye"></i><span id="articleDetailViews">0</span> 次浏览</span>
                </div>
                <div class="detail-tags" id="articleDetailTags"></div>
                <div class="detail-content-body" id="articleDetailContent"></div>
                <div class="article-actions" id="articleActions">
                    <button class="btn btn-secondary btn-heart-outline" id="likeBtn" onclick="likeArticle()">
                        <i class="fa-solid fa-heart"></i>
                        <span id="articleLikes">0</span> 点赞
                    </button>
                    <button class="btn btn-secondary" onclick="shareArticle()">
                        <i class="fa-solid fa-share"></i> 分享
                    </button>
                    <button class="btn btn-danger" id="deleteArticleBtn" style="display:none" onclick="deleteCurrentArticle()">
                        <i class="fa-solid fa-trash"></i> 删除文章
                    </button>
                </div>
            </div>

            <!-- Comments -->
            <div class="comments-section">
                <h3><i class="fa-solid fa-comments"></i> 评论 (<span id="commentsCount">0</span>)</h3>
                <div id="commentFormArea" class="comment-form-area"></div>
                <div class="comments-list" id="commentsList"></div>
            </div>
        </div>
    </div>
</div>

<script>
/* ─────────────────────────────────────────
   State
───────────────────────────────────────── */
let currentUser = null;
let articles = [];
let currentPage = 1;
const PER_PAGE = 12;
let currentArticle = null;
let _csrfToken = null;

/* ─────────────────────────────────────────
   CSRF
───────────────────────────────────────── */
async function getCsrfToken() {
    if (_csrfToken) return _csrfToken;
    try {
        const r = await fetch('/csrf-token', { credentials: 'include' });
        if (r.ok) _csrfToken = (await r.json()).token;
    } catch {}
    return _csrfToken;
}
async function jsonHeaders() {
    const token = await getCsrfToken();
    const h = { 'Content-Type': 'application/json' };
    if (token) h['x-csrf-token'] = token;
    return h;
}

/* ─────────────────────────────────────────
   Auth
───────────────────────────────────────── */
async function checkUserStatus() {
    try {
        const r = await fetch('/api/users/me', { credentials: 'include', cache: 'no-cache' });
        if (r.ok) {
            currentUser = await r.json();
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('loginPrompt').style.display = 'none';
            document.getElementById('userName').textContent = currentUser.name || currentUser.handle;
        } else {
            currentUser = null;
        }
    } catch { currentUser = null; }
}

/* ─────────────────────────────────────────
   Load & render articles
───────────────────────────────────────── */
async function loadArticles() {
    const grid = document.getElementById('articlesGrid');
    const loading = document.getElementById('loadingIndicator');
    const noArticles = document.getElementById('noArticles');
    loading.style.display = 'block';
    noArticles.style.display = 'none';
    grid.innerHTML = '';

    try {
        // Fetch all (server supports pagination but we do client-side paging for filter/sort)
        const params = new URLSearchParams({ page: 1, limit: 200 });
        const cat = document.getElementById('categoryFilter').value;
        if (cat) params.set('category', cat);
        const r = await fetch(`/api/stc/forum/posts?${params}`, { credentials: 'include' });
        if (!r.ok) throw new Error(r.status);
        const data = await r.json();
        articles = data.posts || [];
        applyFilterSort();
    } catch (e) {
        grid.innerHTML = `<div class="loading-indicator"><i class="fa-solid fa-triangle-exclamation" style="color:#ff6b7a"></i><span>加载失败：${e.message}</span></div>`;
    } finally {
        loading.style.display = 'none';
    }
}

function applyFilterSort() {
    const search = document.getElementById('searchInput').value.toLowerCase().trim();
    const sort = document.getElementById('sortFilter').value;
    const cat = document.getElementById('categoryFilter').value;

    let list = [...articles];
    if (cat) list = list.filter(a => a.category === cat);
    if (search) list = list.filter(a => a.title?.toLowerCase().includes(search) || stripHtml(a.content || '').toLowerCase().includes(search) || (a.tags || []).some(t => t.toLowerCase().includes(search)));

    if (sort === 'popular') list.sort((a,b) => (b.likes?.length||0) - (a.likes?.length||0));
    else if (sort === 'views') list.sort((a,b) => (b.views||0) - (a.views||0));
    else list.sort((a,b) => b.createdAt - a.createdAt);

    articles = list;
    currentPage = 1;
    renderArticles();
}

function renderArticles() {
    const grid = document.getElementById('articlesGrid');
    const noArticles = document.getElementById('noArticles');
    if (!articles.length) { grid.innerHTML=''; noArticles.style.display='block'; updatePagination(0); return; }
    noArticles.style.display = 'none';
    const start = (currentPage-1)*PER_PAGE, end = start+PER_PAGE;
    grid.innerHTML = articles.slice(start,end).map(createArticleCard).join('');
    updatePagination(articles.length);
}

function createArticleCard(a) {
    const excerpt = stripHtml(a.content||'').substring(0,150) + (stripHtml(a.content||'').length>150 ? '…':'');
    const tagsHtml = (a.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
    const catName = CAT_NAME[a.category] || a.category || '通用';
    return `<div class="article-card" onclick="openArticleDetail('${a.id}')">
        <div class="article-header">
            <h3 class="article-title">${esc(a.title)}</h3>
            <div class="article-meta">
                <span><i class="fa-solid fa-user"></i>${esc(a.authorName||a.author)}</span>
                <span><i class="fa-solid fa-calendar"></i>${relTime(a.createdAt)}</span>
                <span><i class="fa-solid fa-eye"></i>${a.views||0}</span>
            </div>
        </div>
        <div class="article-content-preview">
            <p class="article-excerpt">${esc(excerpt)}</p>
            <div class="article-tags">${tagsHtml}</div>
        </div>
        <div class="article-footer">
            <div class="article-stats">
                <span><i class="fa-solid fa-heart"></i>${a.likes?.length||0}</span>
                <span><i class="fa-solid fa-comment"></i>${countVisibleComments(a.comments||[])}</span>
            </div>
            <span class="article-category">${catName}</span>
        </div>
    </div>`;
}

/* ─────────────────────────────────────────
   Pagination
───────────────────────────────────────── */
function updatePagination(total) {
    const totalPages = Math.ceil(total/PER_PAGE)||1;
    const pag = document.getElementById('pagination');
    if (totalPages<=1) { pag.style.display='none'; return; }
    pag.style.display='flex';
    document.getElementById('pageInfo').textContent = `第 ${currentPage} 页，共 ${totalPages} 页`;
    document.getElementById('prevPage').disabled = currentPage<=1;
    document.getElementById('nextPage').disabled = currentPage>=totalPages;
}
function previousPage() { if (currentPage>1) { currentPage--; renderArticles(); scrollTo(0,0); } }
function nextPage() { const tp=Math.ceil(articles.length/PER_PAGE); if(currentPage<tp){ currentPage++; renderArticles(); scrollTo(0,0); } }

/* ─────────────────────────────────────────
   Create / Edit article
───────────────────────────────────────── */
function createArticle() {
    if (!currentUser) { alert('请先登录'); return; }
    document.getElementById('articleForm').reset();
    document.getElementById('articleContent').innerHTML = '';
    document.getElementById('articleModalTitle').textContent = '发布新文章';
    document.getElementById('articleModal').style.display = 'flex';
}
function closeArticleModal() { document.getElementById('articleModal').style.display='none'; }

document.getElementById('articleForm').addEventListener('submit', async e => {
    e.preventDefault();
    if (!currentUser) { alert('请先登录'); return; }
    const title   = document.getElementById('articleTitle').value.trim();
    const content = document.getElementById('articleContent').innerHTML.trim();
    const category = document.getElementById('articleCategory').value;
    const tagsRaw = document.getElementById('articleTags').value;
    const tags = tagsRaw ? tagsRaw.split(',').map(t=>t.trim()).filter(Boolean) : [];
    if (!title || !content) { alert('请填写标题和内容'); return; }
    try {
        const r = await fetch('/api/stc/forum/posts', {
            method:'POST', credentials:'include',
            headers: await jsonHeaders(),
            body: JSON.stringify({ title, content, category, tags }),
        });
        if (!r.ok) { const d=await r.json(); throw new Error(d.error||'发布失败'); }
        closeArticleModal();
        await loadArticles();
        alert('文章发布成功！');
    } catch(e) { alert(e.message||'发布失败，请稍后重试'); }
});

/* ─────────────────────────────────────────
   Article detail
───────────────────────────────────────── */
async function openArticleDetail(id) {
    try {
        const r = await fetch(`/api/stc/forum/posts/${id}`, { credentials:'include' });
        if (!r.ok) throw new Error('加载失败');
        currentArticle = await r.json();
        renderArticleDetail();
        document.getElementById('articleDetailModal').style.display='flex';
    } catch(e) { alert(e.message); }
}

function renderArticleDetail() {
    const a = currentArticle;
    document.getElementById('articleDetailTitle').textContent = a.title;
    document.getElementById('articleDetailAuthor').textContent = a.authorName||a.author;
    document.getElementById('articleDetailDate').textContent = new Date(a.createdAt).toLocaleString('zh-CN');
    document.getElementById('articleDetailCategory').textContent = CAT_NAME[a.category]||a.category||'通用';
    document.getElementById('articleDetailViews').textContent = a.views||0;
    // Tags
    const tagsEl = document.getElementById('articleDetailTags');
    tagsEl.innerHTML = (a.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
    // Content (HTML from rich editor)
    document.getElementById('articleDetailContent').innerHTML = a.content||'';
    // Likes
    const liked = currentUser && (a.likes||[]).includes(currentUser.handle);
    document.getElementById('articleLikes').textContent = a.likes?.length||0;
    const likeBtn = document.getElementById('likeBtn');
    likeBtn.className = 'btn btn-secondary' + (liked?' btn-liked':' btn-heart-outline');
    likeBtn.querySelector('i').className = 'fa-solid fa-heart';
    // Delete button
    const delBtn = document.getElementById('deleteArticleBtn');
    delBtn.style.display = (currentUser&&(currentUser.handle===a.author||currentUser.admin)) ? '':'none';
    // Comments
    renderComments();
}

function countVisibleComments(comments) {
    return (comments||[]).filter(c=>!c.deleted).length;
}

function renderComments() {
    const a = currentArticle;
    document.getElementById('commentsCount').textContent = countVisibleComments(a.comments||[]);
    // Comment form
    const formArea = document.getElementById('commentFormArea');
    if (currentUser) {
        formArea.innerHTML = `
            <textarea id="commentContent" placeholder="写下你的评论..." rows="3"></textarea>
            <div class="form-actions">
                <button class="btn btn-primary" onclick="submitComment()">
                    <i class="fa-solid fa-paper-plane"></i> 发表评论
                </button>
            </div>`;
    } else {
        formArea.innerHTML = `<div class="no-login-comment">
            <i class="fa-solid fa-lock"></i>
            <span><a href="/login">登录</a>后参与评论讨论</span>
        </div>`;
    }
    // Comments list (nested)
    const topComments = (a.comments||[]).filter(c=>!c.parentId);
    const list = document.getElementById('commentsList');
    if (!topComments.length) {
        list.innerHTML='<p style="text-align:center;color:rgba(220,220,210,.4);padding:20px">暂无评论，快来发表第一条吧！</p>';
        return;
    }
    list.innerHTML = topComments.map(c=>buildCommentHtml(c, a.comments||[], 0)).join('');
}

function buildCommentHtml(c, allComments, level) {
    const canDel = currentUser&&(currentUser.handle===c.author||currentUser.admin);
    const delBtn = canDel&&!c.deleted ? `<button class="comment-delete-btn" onclick="deleteComment('${c.id}')"><i class="fa-solid fa-trash"></i></button>` : '';
    const replyBtn = currentUser&&!c.deleted&&level===0 ? `<button class="comment-reply-btn" onclick="toggleReplyForm('${c.id}')"><i class="fa-solid fa-reply"></i> 回复</button>` : '';
    const replies = allComments.filter(r=>r.parentId===c.id);

    return `<div class="comment" data-level="${level}" data-id="${c.id}">
        <div class="comment-header">
            <span class="comment-author"><i class="fa-solid fa-${level?'reply':'user'}"></i> ${esc(c.authorName||c.author)}</span>
            <span class="comment-date">${relTime(c.createdAt)}</span>
            <div class="comment-actions-bar">${replyBtn}${delBtn}</div>
        </div>
        <div class="comment-content-text">${esc(c.content)}</div>
        ${currentUser&&!c.deleted&&level===0?`<div class="reply-form-area" id="rf-${c.id}">
            <textarea id="rti-${c.id}" placeholder="回复 ${esc(c.authorName||c.author)}..." rows="2"></textarea>
            <div class="reply-actions">
                <button class="btn btn-secondary btn-sm" onclick="toggleReplyForm('${c.id}')">取消</button>
                <button class="btn btn-primary btn-sm" onclick="submitReply('${c.id}')"><i class="fa-solid fa-paper-plane"></i> 回复</button>
            </div>
        </div>`:''}
        ${replies.map(r=>buildCommentHtml(r,allComments,level+1)).join('')}
    </div>`;
}

function toggleReplyForm(commentId) {
    const form = document.getElementById(`rf-${commentId}`);
    if (!form) return;
    const open = form.classList.toggle('open');
    if (open) document.getElementById(`rti-${commentId}`)?.focus();
}

/* ─────────────────────────────────────────
   Comment / Reply / Like / Delete actions
───────────────────────────────────────── */
async function submitComment() {
    if (!currentUser) { alert('请先登录'); return; }
    const el = document.getElementById('commentContent');
    const content = el.value.trim();
    if (!content) { alert('请输入评论内容'); return; }
    try {
        const r = await fetch(`/api/stc/forum/posts/${currentArticle.id}/comments`, {
            method:'POST', credentials:'include',
            headers: await jsonHeaders(),
            body: JSON.stringify({ content }),
        });
        if (!r.ok) { const d=await r.json(); throw new Error(d.error||'评论失败'); }
        const d = await r.json();
        currentArticle.comments = currentArticle.comments||[];
        currentArticle.comments.push(d.comment);
        el.value='';
        renderComments();
    } catch(e) { alert(e.message||'评论失败'); }
}

async function submitReply(parentId) {
    if (!currentUser) { alert('请先登录'); return; }
    const el = document.getElementById(`rti-${parentId}`);
    const content = el?.value.trim();
    if (!content) { alert('请输入回复内容'); return; }
    try {
        const r = await fetch(`/api/stc/forum/posts/${currentArticle.id}/comments/${parentId}/reply`, {
            method:'POST', credentials:'include',
            headers: await jsonHeaders(),
            body: JSON.stringify({ content }),
        });
        if (!r.ok) { const d=await r.json(); throw new Error(d.error||'回复失败'); }
        const d = await r.json();
        currentArticle.comments = currentArticle.comments||[];
        currentArticle.comments.push(d.comment);
        toggleReplyForm(parentId);
        renderComments();
    } catch(e) { alert(e.message||'回复失败'); }
}

async function deleteComment(commentId) {
    if (!confirm('确定删除这条评论？删除后将同时移除所有回复。')) return;
    try {
        const r = await fetch(`/api/stc/forum/posts/${currentArticle.id}/comments/${commentId}/delete`, {
            method:'POST', credentials:'include',
            headers: await jsonHeaders(),
        });
        if (!r.ok) { const d=await r.json(); throw new Error(d.error||'删除失败'); }
        // Remove comment and its replies locally
        const allToRemove = getDescendantIds(commentId, currentArticle.comments||[]);
        currentArticle.comments = (currentArticle.comments||[]).filter(c=>!allToRemove.includes(c.id));
        renderComments();
    } catch(e) { alert(e.message||'删除失败'); }
}

function getDescendantIds(id, all) {
    const ids=[id];
    all.filter(c=>c.parentId===id).forEach(c=>ids.push(...getDescendantIds(c.id,all)));
    return ids;
}

async function likeArticle() {
    if (!currentUser) { alert('请先登录后再点赞'); return; }
    try {
        const r = await fetch(`/api/stc/forum/posts/${currentArticle.id}/like`, {
            method:'POST', credentials:'include',
            headers: await jsonHeaders(),
        });
        if (!r.ok) throw new Error('点赞失败');
        const d = await r.json();
        currentArticle.likes = d.liked
            ? [...(currentArticle.likes||[]), currentUser.handle]
            : (currentArticle.likes||[]).filter(h=>h!==currentUser.handle);
        document.getElementById('articleLikes').textContent = d.count;
        const likeBtn = document.getElementById('likeBtn');
        likeBtn.className = 'btn btn-secondary' + (d.liked?' btn-liked':' btn-heart-outline');
        likeBtn.querySelector('i').className = 'fa-solid fa-heart';
    } catch(e) { alert(e.message); }
}

async function deleteCurrentArticle() {
    if (!currentArticle || !confirm('确定要删除这篇文章吗？')) return;
    try {
        const r = await fetch(`/api/stc/forum/posts/${currentArticle.id}/delete`, {
            method:'POST', credentials:'include',
            headers: await jsonHeaders(),
        });
        if (!r.ok) { const d=await r.json(); throw new Error(d.error||'删除失败'); }
        closeArticleDetailModal();
        await loadArticles();
        alert('文章删除成功！');
    } catch(e) { alert(e.message||'删除失败'); }
}

function shareArticle() {
    if (!currentArticle) return;
    const url = `${location.origin}/forum`;
    if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(()=>alert('链接已复制到剪贴板！')).catch(()=>alert(url));
    } else { alert(url); }
}

function closeArticleDetailModal() {
    document.getElementById('articleDetailModal').style.display='none';
    currentArticle=null;
}

/* ─────────────────────────────────────────
   Rich Editor toolbar
───────────────────────────────────────── */
document.querySelectorAll('.toolbar-btn[data-command]').forEach(btn => {
    btn.addEventListener('click', () => {
        const cmd = btn.dataset.command;
        const val = btn.dataset.value||null;
        if (cmd==='createLink') {
            const url = prompt('请输入链接URL:');
            if (url) document.execCommand(cmd, false, url);
        } else {
            document.execCommand(cmd, false, val);
        }
        btn.classList.toggle('active', document.queryCommandState(cmd));
        document.getElementById('articleContent').focus();
    });
});
document.getElementById('insertImageBtn').addEventListener('click', () => document.getElementById('imageUpload').click());
document.getElementById('imageUpload').addEventListener('change', async function() {
    const file = this.files?.[0]; if (!file) return;
    if (file.size > 8 * 1024 * 1024) { alert('图片大小不能超过 8MB'); this.value=''; return; }
    // Convert to base64 to avoid multer/CSRF issues with multipart
    const reader = new FileReader();
    reader.onload = async (e) => {
        const base64 = /** @type {string} */ (e.target?.result);
        try {
            const r = await fetch('/api/stc/forum/upload-image', {
                method: 'POST',
                credentials: 'include',
                headers: await jsonHeaders(),
                body: JSON.stringify({ image: base64, filename: file.name }),
            });
            if (r.ok) { const d = await r.json(); document.execCommand('insertImage', false, d.url); }
            else { const d = await r.json(); alert('上传失败：' + (d.error||r.status)); }
        } catch (err) { alert('上传失败：' + err.message); }
    };
    reader.readAsDataURL(file);
    this.value='';
});
document.getElementById('articleContent').addEventListener('keyup', () => {
    document.querySelectorAll('.toolbar-btn[data-command]').forEach(btn => {
        const cmd = btn.dataset.command;
        if (!btn.dataset.value) btn.classList.toggle('active', document.queryCommandState(cmd));
    });
});

/* ─────────────────────────────────────────
   Filter / Search events
───────────────────────────────────────── */
let debounceTimer;
document.getElementById('searchInput').addEventListener('input', ()=>{
    clearTimeout(debounceTimer);
    debounceTimer=setTimeout(applyFilterSort,300);
});
document.getElementById('categoryFilter').addEventListener('change', loadArticles);
document.getElementById('sortFilter').addEventListener('change', applyFilterSort);

/* ─────────────────────────────────────────
   Helpers
───────────────────────────────────────── */
const CAT_NAME = { tutorial:'教程', discussion:'讨论', announcement:'公告', question:'问答', showcase:'展示', general:'通用' };
function esc(s){ const d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; }
function stripHtml(html){ const d=document.createElement('div'); d.innerHTML=html; return d.textContent||d.innerText||''; }
function relTime(ts) {
    const sec=Math.floor((Date.now()-Number(ts))/1000);
    if(sec<60) return '刚刚';
    if(sec<3600) return Math.floor(sec/60)+'分钟前';
    if(sec<86400) return Math.floor(sec/3600)+'小时前';
    if(sec<2592000) return Math.floor(sec/86400)+'天前';
    return new Date(Number(ts)).toLocaleDateString('zh-CN');
}

/* Click outside modal to close */
[document.getElementById('articleModal'), document.getElementById('articleDetailModal')].forEach(m=>{
    m.addEventListener('click', e=>{ if(e.target===m){ if(m.id==='articleModal') closeArticleModal(); else closeArticleDetailModal(); } });
});

/* ─────────────────────────────────────────
   Init
───────────────────────────────────────── */
(async()=>{
    await checkUserStatus();
    await loadArticles();
})();
</script>
