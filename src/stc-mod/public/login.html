<!DOCTYPE html>
<html>
<head>
    <base href="/">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, viewport-fit=cover, initial-scale=1, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="darkreader-lock">
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" type="text/css" href="css/st-tailwind.css">
    <link rel="stylesheet" type="text/css" href="css/login.css">
    <link rel="stylesheet" type="text/css" href="css/fontawesome.min.css">
    <link rel="stylesheet" type="text/css" href="css/solid.min.css">
    <link rel="stylesheet" type="text/css" href="css/brands.min.css">
    <link href="webfonts/NotoSans/stylesheet.css" rel="stylesheet">
    <title>SillyTavern - 登录</title>
    <style>
        html { overflow: hidden !important; }
        /* Hide all scrollbars on the login page */
        body.login *::-webkit-scrollbar { display: none !important; }
        body.login * { scrollbar-width: none !important; }
        /* ── Video BG ── */
        #stc-bg-video {
            position: fixed; inset: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0; pointer-events: none;
        }
        #stc-bg-overlay {
            position: fixed; inset: 0; z-index: 1;
            background: rgba(6, 3, 20, 0.50);
        }
        #stc-sakura { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

        /* ── Body & HTML: prevent any page-level scrollbars ── */
        body.login {
            background: #06040f !important;
            overflow: hidden !important;
            margin: 0 !important; padding: 0 !important;
        }

        /* ── Shadow popup: transparent, no scrollbar ── */
        #shadow_popup {
            background: transparent !important;
            z-index: 100 !important;
            overflow: hidden !important;
        }

        /* ── Glass card: viewport-center via fixed positioning ── */
        #dialogue_popup {
            /* Position: reset ALL possible offsets from official CSS */
            position: fixed !important;
            top: 50vh !important;
            left: 50vw !important;
            right: auto !important;
            bottom: auto !important;
            transform: translate(-50%, -50%) !important;
            margin: 0 !important;
            /* Size */
            width: calc(100vw - 48px) !important;
            max-width: 420px !important;
            max-height: 92vh !important;
            overflow-x: hidden !important;
            overflow-y: auto !important;
            scrollbar-width: none !important;
            box-sizing: border-box !important;
            /* Stack above everything */
            z-index: 101 !important;
            /* Glass visuals */
            background: rgba(255, 255, 255, 0.055) !important;
            backdrop-filter: blur(36px) !important;
            -webkit-backdrop-filter: blur(36px) !important;
            border: 1px solid rgba(220, 160, 255, 0.22) !important;
            border-radius: 26px !important;
            box-shadow:
                0 0 0 1px rgba(255,160,220,.06) inset,
                0 0 60px rgba(150,80,255,.16),
                0 24px 80px rgba(0,0,0,.55) !important;
            animation: stcFadeUp .55s cubic-bezier(.22,1,.36,1) both;
        }
        @keyframes stcFadeUp {
            from { opacity:0; transform:translateY(24px) scale(.97); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }

        /* Inner shimmer */
        #dialogue_popup::before {
            content: '' !important; position: absolute !important; inset: 0 !important;
            background: linear-gradient(135deg,rgba(255,150,220,.05) 0%,transparent 45%,rgba(108,99,255,.04) 100%) !important;
            pointer-events: none !important; z-index: 0 !important; border-radius: inherit !important;
        }
        /* Scan lines */
        #dialogue_popup::after {
            content: '' !important; position: absolute !important; inset: 0 !important;
            background: repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,.006) 3px,rgba(255,255,255,.006) 4px) !important;
            pointer-events: none !important; z-index: 0 !important; border-radius: inherit !important;
        }

        #dialogue_popup_holder { background: transparent !important; border: none !important; }
        #dialogue_popup_text  { background: transparent !important; }

        /* ── Corner brackets ── */
        .stc-corner {
            position: absolute; width: 22px; height: 22px;
            border-color: rgba(255,140,210,.52); border-style: solid; pointer-events: none; z-index: 99;
        }
        .stc-corner.tl { top:13px; left:13px; border-width:2px 0 0 2px; border-radius:5px 0 0 0; }
        .stc-corner.tr { top:13px; right:13px; border-width:2px 2px 0 0; border-radius:0 5px 0 0; }
        .stc-corner.bl { bottom:13px; left:13px; border-width:0 0 2px 2px; border-radius:0 0 0 5px; }
        .stc-corner.br { bottom:13px; right:13px; border-width:0 2px 2px 0; border-radius:0 0 5px 0; }

        /* Anime badge */
        .stc-anime-badge {
            display: block; font-size: .63em; letter-spacing: .24em; font-weight: 700;
            color: rgba(255,170,230,.65); margin-bottom: 14px; text-transform: uppercase;
        }
        .stc-anime-badge::before { content: '◈ '; color: rgba(200,130,255,.6); }
        .stc-anime-badge::after  { content: ' ◈'; color: rgba(200,130,255,.6); }

        /* ── Logo ── */
        #logoBlock { flex-direction: column !important; align-items: center !important; gap: 12px !important; }
        #logoBlock img.logo {
            border-radius: 50% !important;
            background: rgba(160,80,255,.12) !important;
            border: 2px solid rgba(200,130,255,.38) !important;
            box-shadow: 0 0 36px rgba(200,100,255,.38) !important;
            padding: 6px !important;
            animation: logoPulse 3.5s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%,100% { box-shadow: 0 0 30px rgba(200,100,255,.32); }
            50%      { box-shadow: 0 0 56px rgba(200,100,255,.58), 0 0 20px rgba(255,140,210,.2); }
        }
        #logoBlock span {
            font-size: 1.5em !important; font-weight: 800 !important; letter-spacing: -.3px !important;
            background: linear-gradient(135deg,#fff 20%,#d8a8ff 60%,#ffb0d8) !important;
            background-clip: text !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
        }

        /* ── Prompts ── */
        #normalLoginPrompt, #discreetLoginPrompt {
            color: rgba(255,200,240,.4) !important; font-size: .84em !important;
            font-weight: 400 !important; letter-spacing: .06em !important;
        }

        /* ── User list ── */
        #userListBlock { width: 100% !important; }
        #userList { gap: 12px !important; flex-wrap: wrap !important; justify-content: center !important; }
        #userList .userListItem {
            background: rgba(255,255,255,.06) !important;
            border: 1px solid rgba(200,140,255,.2) !important;
            border-radius: 16px !important; box-shadow: none !important;
            transition: all .22s !important; padding: 10px 14px !important;
        }
        #userList .userListItem:hover {
            background: rgba(180,80,255,.15) !important;
            border-color: rgba(200,140,255,.42) !important;
            transform: translateY(-3px) !important;
            box-shadow: 0 6px 22px rgba(180,80,255,.28) !important;
        }

        /* ── Input entry blocks: full-width, well-spaced ── */
        #handleEntryBlock, #passwordEntryBlock, #passwordRecoveryBlock {
            width: 100% !important;
            gap: 12px !important;
        }

        /* ── Input fields ── */
        .text_pole {
            width: 100% !important;
            padding: 13px 16px !important;
            background: rgba(255,255,255,.07) !important;
            border: 1px solid rgba(200,140,255,.2) !important;
            border-radius: 12px !important;
            color: #eee !important;
            font-size: .95em !important;
            transition: border-color .2s, background .2s !important;
            box-sizing: border-box !important;
        }
        .text_pole:focus {
            border-color: rgba(200,100,255,.6) !important;
            background: rgba(180,80,255,.09) !important;
            outline: none !important;
            box-shadow: 0 0 0 3px rgba(200,100,255,.12) !important;
        }

        /* ── Login / recovery button containers: full-width ── */
        #passwordEntryBlock > .flex-container,
        #passwordRecoveryBlock > .flex-container {
            width: 100% !important;
            gap: 10px !important;
        }

        /* ── Login button: full-width, tall, gradient ── */
        #loginButton {
            width: 100% !important;
            padding: 14px 20px !important;
            font-size: 1em !important;
            font-weight: 700 !important;
            letter-spacing: .04em !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 8px !important;
            background: linear-gradient(135deg, #7c6fff, #c060ff, #4a90e2) !important;
            border: 1px solid rgba(255,150,220,.2) !important;
            border-radius: 12px !important;
            color: #fff !important;
            cursor: pointer !important;
            box-shadow: 0 6px 24px rgba(150,60,255,.42) !important;
            transition: all .22s !important;
        }
        #loginButton:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 10px 32px rgba(180,80,255,.58) !important;
        }
        #sendRecovery {
            flex: 1 !important; padding: 12px 16px !important;
            background: linear-gradient(135deg, #7c6fff, #c060ff) !important;
            border: 1px solid rgba(255,150,220,.2) !important;
            border-radius: 10px !important; color: #fff !important;
            font-weight: 600 !important; cursor: pointer !important;
            box-shadow: 0 5px 18px rgba(150,60,255,.38) !important;
            transition: all .2s !important;
        }
        #sendRecovery:hover { transform: translateY(-1px) !important; box-shadow: 0 8px 26px rgba(180,80,255,.5) !important; }
        #cancelRecovery {
            flex: 1 !important; padding: 12px 16px !important;
            background: rgba(255,255,255,.07) !important;
            border: 1px solid rgba(200,140,255,.2) !important;
            border-radius: 10px !important; color: rgba(255,220,245,.7) !important;
            font-weight: 500 !important; cursor: pointer !important;
            transition: all .2s !important;
        }
        #cancelRecovery:hover { background: rgba(200,140,255,.12) !important; }

        /* ── Forgot password ── */
        #recoverPassword {
            color: rgba(200,160,255,.7) !important; font-size: .82em !important;
            text-decoration: none !important; align-self: flex-end !important;
        }
        #recoverPassword:hover { color: rgba(230,190,255,.9) !important; text-decoration: underline !important; }

        /* ── Error message ── */
        #errorMessage:not(:empty) {
            width: 100% !important;
            background: rgba(220,60,100,.1) !important;
            border: 1px solid rgba(220,80,120,.3) !important;
            border-radius: 10px !important;
            color: #ffaac0 !important; font-size: .84em !important;
            padding: 10px 14px !important; text-align: center !important;
        }

        /* ═══════════════════════════════════
           STC 公告 — 二次元风格
           ═══════════════════════════════════ */
        .stc-announcements { width: 100%; margin: 14px 0 6px; }

        /* 公告区块标题 */
        .stc-ann-header {
            display: flex; align-items: center; gap: 7px;
            font-size: .68em; letter-spacing: .18em; font-weight: 700;
            color: rgba(255,170,230,.55); margin-bottom: 8px; text-transform: uppercase;
        }
        .stc-ann-header::before { content: '❋'; font-size: 1.1em; color: rgba(255,140,210,.6); }
        .stc-ann-header::after  { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg,rgba(200,120,255,.25),transparent); margin-left: 6px; }

        .stc-announcement {
            position: relative;
            padding: 11px 14px 11px 18px;
            margin: 7px 0; border-radius: 11px;
            font-size: .84em; line-height: 1.65; text-align: left;
            overflow: hidden;
        }
        /* Glowing left bar */
        .stc-announcement::before {
            content: ''; position: absolute;
            left: 0; top: 0; bottom: 0; width: 3px;
            border-radius: 11px 0 0 11px;
        }
        /* Sparkle top-right decoration */
        .stc-announcement::after {
            content: '✦'; position: absolute;
            top: 7px; right: 10px;
            font-size: .7em; opacity: .35;
        }
        .stc-announcement .ann-title {
            font-weight: 700; display: flex; align-items: center; gap: 6px;
            margin-bottom: 4px; font-size: 1em;
        }
        .stc-announcement.info {
            background: linear-gradient(135deg,rgba(70,130,220,.12),rgba(100,160,255,.06));
            border: 1px solid rgba(70,130,220,.2); border-left: none; color: #b8d4f8;
        }
        .stc-announcement.info::before { background: linear-gradient(180deg,#5a9eff,#4682dc); box-shadow: 0 0 8px rgba(86,158,255,.5); }
        .stc-announcement.info::after  { color: #5a9eff; }
        .stc-announcement.info .ann-title::before { content: '◆'; color: #5a9eff; font-size: .85em; }

        .stc-announcement.warning {
            background: linear-gradient(135deg,rgba(220,160,50,.12),rgba(255,200,80,.06));
            border: 1px solid rgba(220,160,50,.22); border-left: none; color: #f5d888;
        }
        .stc-announcement.warning::before { background: linear-gradient(180deg,#ffd54f,#dcb432); box-shadow: 0 0 8px rgba(220,180,50,.5); }
        .stc-announcement.warning::after  { color: #ffd54f; }
        .stc-announcement.warning .ann-title::before { content: '◆'; color: #ffd54f; font-size: .85em; }

        .stc-announcement.success {
            background: linear-gradient(135deg,rgba(70,200,120,.12),rgba(80,220,140,.06));
            border: 1px solid rgba(70,200,100,.2); border-left: none; color: #9aecc0;
        }
        .stc-announcement.success::before { background: linear-gradient(180deg,#56d68a,#35b468); box-shadow: 0 0 8px rgba(70,200,100,.5); }
        .stc-announcement.success::after  { color: #56d68a; }
        .stc-announcement.success .ann-title::before { content: '◆'; color: #56d68a; font-size: .85em; }

        .stc-announcement.error {
            background: linear-gradient(135deg,rgba(220,60,100,.12),rgba(255,80,120,.06));
            border: 1px solid rgba(220,60,100,.22); border-left: none; color: #ffb0c0;
        }
        .stc-announcement.error::before { background: linear-gradient(180deg,#ff6080,#dc4060); box-shadow: 0 0 8px rgba(220,60,100,.5); }
        .stc-announcement.error::after  { color: #ff6080; }
        .stc-announcement.error .ann-title::before { content: '◆'; color: #ff6080; font-size: .85em; }

        /* ── OAuth ── */
        .stc-oauth-section { margin-top: 14px; text-align: center; }
        .stc-oauth-divider { display: flex; align-items: center; margin: 16px 0; color: rgba(255,200,240,.3); }
        .stc-oauth-divider::before, .stc-oauth-divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(200,140,255,.15); }
        .stc-oauth-divider span { padding: 0 12px; font-size: .8em; letter-spacing: .06em; }
        .stc-oauth-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .stc-oauth-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 9px 18px; border-radius: 10px; font-size: .88em; font-weight: 500;
            border: 1px solid rgba(200,140,255,.15);
            background: rgba(255,255,255,.06); color: #ddd; text-decoration: none;
            transition: all .2s;
        }
        .stc-oauth-btn:hover { background: rgba(200,100,255,.12) !important; transform: translateY(-1px); border-color: rgba(200,140,255,.35) !important; }
        .stc-oauth-btn.github  { border-color: rgba(110,84,148,.5); }
        .stc-oauth-btn.discord { border-color: rgba(88,101,242,.5); }
        .stc-oauth-btn.linuxdo { border-color: rgba(245,158,11,.4); }

        /* ── Footer links ── */
        .stc-links {
            text-align: center; margin-top: 20px;
            display: flex; justify-content: center; gap: 4px; flex-wrap: wrap;
        }
        .stc-links a {
            color: rgba(200,160,255,.65); text-decoration: none;
            font-size: .82em; padding: 4px 10px; border-radius: 6px; transition: all .2s;
        }
        .stc-links a:hover { background: rgba(200,140,255,.1); color: rgba(230,200,255,.9); }
        #stc-purchase-link { display: none; }

        /* ── Expired account panel ── */
        #stc-expired-panel { display: none; width: 100%; margin-top: 10px; }
        .stc-expired-header {
            background: rgba(220,60,60,.1); border: 1px solid rgba(220,60,60,.3);
            border-radius: 12px; padding: 16px; margin-bottom: 16px; text-align: center;
        }
        .stc-expired-header .exp-icon { font-size: 2em; color: #e74c3c; display: block; margin-bottom: 8px; }
        .stc-expired-header h3 { margin: 0 0 5px; color: #f08080; font-size: 1em; font-weight: 600; }
        .stc-expired-header p  { margin: 0; color: rgba(255,255,255,.45); font-size: .82em; }
        .stc-renew-form { display: flex; flex-direction: column; gap: 10px; }
        .stc-renew-form input {
            padding: 11px 14px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,.12);
            background: rgba(255,255,255,.07);
            color: #eee; font-size: .92em; width: 100%; outline: none; box-sizing: border-box;
        }
        .stc-renew-form input:focus { border-color: rgba(108,99,255,.5); }
        .stc-renew-form .btn-renew {
            padding: 12px; border-radius: 10px; border: none; cursor: pointer;
            font-size: .92em; font-weight: 600;
            background: linear-gradient(135deg, #2ecc71, #1abc9c); color: #fff;
            box-shadow: 0 4px 16px rgba(46,204,113,.3); transition: all .2s;
        }
        .stc-renew-form .btn-renew:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(46,204,113,.4); }
        .stc-renew-form .btn-renew:disabled { opacity: .5; cursor: not-allowed; transform: none; }
        .stc-buy-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 11px; border-radius: 10px; border: 1px solid rgba(243,156,18,.4);
            background: rgba(243,156,18,.08); color: #f39c12; text-decoration: none;
            font-size: .9em; font-weight: 600; transition: all .2s; margin-top: 4px;
        }
        .stc-buy-btn:hover { background: rgba(243,156,18,.15); transform: translateY(-1px); }
        .stc-renew-msg { font-size: .83em; padding: 9px 12px; border-radius: 8px; text-align: center; display: none; }
        .stc-renew-msg.ok  { background: rgba(46,204,113,.1); border: 1px solid rgba(46,204,113,.3); color: #2ecc71; }
        .stc-renew-msg.err { background: rgba(231,76,60,.1);  border: 1px solid rgba(231,76,60,.3);  color: #e74c3c; }
        .stc-back-login { text-align: center; margin-top: 12px; font-size: .82em; color: rgba(255,255,255,.4); }
        .stc-back-login a { color: rgba(138,180,248,.75); text-decoration: none; }
        .stc-back-login a:hover { text-decoration: underline; }
    </style>
</head>
<body class="login">

    <!-- Adaptive background: image on mobile, video on PC -->
    <script>
    (function(){
        var mobile = window.matchMedia('(max-width:1023px)').matches ||
            /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
        var el = mobile ? document.createElement('img') : document.createElement('video');
        el.id = 'stc-bg-video';
        if (mobile) {
            el.src = 'https://t.alcy.cc/moemp';
            el.alt = '';
        } else {
            el.autoplay = true; el.muted = true; el.loop = true;
            el.setAttribute('playsinline','');
            var s = document.createElement('source');
            s.src = 'https://t.alcy.cc/acg'; s.type = 'video/mp4';
            el.appendChild(s);
        }
        el.addEventListener('error', function(){
            var ov = document.getElementById('stc-bg-overlay');
            if (ov) ov.style.background =
                'linear-gradient(125deg,#06040f 0%,#180d3a 40%,#0d1b3e 70%,#06040f 100%)';
        });
        document.currentScript.insertAdjacentElement('beforebegin', el);
    })();
    </script>
    <div id="stc-bg-overlay"></div>

    <div id="shadow_popup" style="opacity: 0;">
        <div id="dialogue_popup">
            <div id="dialogue_popup_holder">
                <div id="dialogue_popup_text">
                    <div id="userSelectBlock" class="flex-container flexFlowColumn alignItemsCenter">
                        <h2 id="logoBlock" class="flex-container">
                            <img src="img/logo.png" alt="SillyTavern" class="logo">
                            <span>SillyTavern</span>
                        </h2>
                        <h3 id="normalLoginPrompt">选择账号登录</h3>
                        <h3 id="discreetLoginPrompt">输入登录信息</h3>
                        <div id="userListBlock" class="wide100p">
                            <div id="userList" class="flex-container justifySpaceEvenly"></div>
                            <div id="handleEntryBlock" style="display:none;" class="flex-container flexFlowColumn alignItemsCenter">
                                <input id="userHandle" class="text_pole" type="text" placeholder="用户名" autocomplete="username">
                            </div>
                            <div id="passwordEntryBlock" style="display:none;" class="flex-container flexFlowColumn alignItemsCenter">
                                <input id="userPassword" class="text_pole" type="password" placeholder="密码" autocomplete="current-password">
                                <a id="recoverPassword" href="#" onclick="return false;">忘记密码？</a>
                                <div class="flex-container">
                                    <div id="loginButton" class="menu_button">登录</div>
                                </div>
                            </div>
                            <div id="passwordRecoveryBlock" style="display:none;" class="flex-container flexFlowColumn alignItemsCenter">
                                <div id="recoverMessage">恢复码已发送到服务器控制台。</div>
                                <input id="recoveryCode" class="text_pole" type="text" placeholder="恢复码">
                                <input id="newPassword" class="text_pole" type="password" placeholder="新密码" autocomplete="new-password">
                                <div class="flex-container flexGap10">
                                    <div id="sendRecovery" class="menu_button">确认</div>
                                    <div id="cancelRecovery" class="menu_button">取消</div>
                                </div>
                            </div>
                        </div>

                        <div id="stc-oauth-section" class="stc-oauth-section" style="display:none;">
                            <div class="stc-oauth-divider"><span>或使用第三方账号登录</span></div>
                            <div class="stc-oauth-buttons">
                                <a id="oauth-github" class="stc-oauth-btn github" href="/api/stc/oauth/github" style="display:none;">
                                    <i class="fa-brands fa-github"></i> GitHub
                                </a>
                                <a id="oauth-discord" class="stc-oauth-btn discord" href="/api/stc/oauth/discord" style="display:none;">
                                    <i class="fa-brands fa-discord"></i> Discord
                                </a>
                                <a id="oauth-linuxdo" class="stc-oauth-btn linuxdo" href="/api/stc/oauth/linuxdo" style="display:none;">
                                    <i class="fa-solid fa-globe"></i> Linux.do
                                </a>
                            </div>
                        </div>

                        <!-- Login-page announcements -->
                        <div id="stc-announcements-container" class="stc-announcements"></div>

                        <div class="neutral_warning" id="errorMessage"></div>

                        <!-- Expired account panel -->
                        <div id="stc-expired-panel">
                            <div class="stc-expired-header">
                                <span class="exp-icon"><i class="fa-solid fa-clock-rotate-left"></i></span>
                                <h3>账户使用时间已到期</h3>
                                <p id="stc-expired-desc">请使用新的激活码续费后继续使用</p>
                            </div>
                            <div class="stc-renew-form">
                                <input id="stc-renew-handle" type="text" placeholder="账号用户名" autocomplete="username" readonly>
                                <input id="stc-renew-code-input" type="text" placeholder="输入激活码" autocomplete="off">
                                <button id="stc-renew-submit" class="btn-renew">
                                    <i class="fa-solid fa-rotate-right"></i> 立即续费
                                </button>
                                <a id="stc-buy-link" href="#" class="stc-buy-btn" target="_blank" style="display:none">
                                    <i class="fa-solid fa-cart-shopping"></i> 购买激活码
                                </a>
                                <div id="stc-renew-msg" class="stc-renew-msg"></div>
                            </div>
                            <div class="stc-back-login">
                                <a href="/login">← 使用其他账号登录</a>
                            </div>
                        </div>

                        <div class="stc-links">
                            <a href="/register">注册账号</a>
                            <a id="stc-purchase-link" href="#">续费账户</a>
                            <a href="/">返回首页</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="lib/jquery-3.5.1.min.js"></script>
    <script src="scripts/login.js" type="module"></script>
    <script>
    /* ── Sakura particles ── */
    (function() {
        const c = document.createElement('canvas');
        c.id = 'stc-sakura';
        c.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;z-index:2;pointer-events:none';
        document.body.appendChild(c);
        const ctx = c.getContext('2d');
        const colors = ['#ffb7c5','#ffc8d4','#e8c4f8','#c4d8ff','#ffd8f0','#e0b8ff'];
        const petals = [];
        function resize() { c.width = innerWidth; c.height = innerHeight; }
        resize(); window.addEventListener('resize', resize);
        for (let i = 0; i < 36; i++) {
            petals.push({
                x: Math.random() * c.width, y: Math.random() * c.height,
                r: Math.random() * 5.5 + 2,
                vx: (Math.random() - .5) * .9, vy: Math.random() * 1.1 + .35,
                rot: Math.random() * Math.PI * 2, vr: (Math.random() - .5) * .04,
                a: Math.random() * .42 + .1,
                color: colors[Math.floor(Math.random() * colors.length)],
            });
        }
        function drawPetal(p) {
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.globalAlpha = p.a;
            ctx.beginPath();
            ctx.moveTo(0, -p.r);
            ctx.bezierCurveTo(p.r*.8, -p.r*.8, p.r, p.r*.5, 0, p.r);
            ctx.bezierCurveTo(-p.r, p.r*.5, -p.r*.8, -p.r*.8, 0, -p.r);
            ctx.fillStyle = p.color; ctx.fill(); ctx.restore();
        }
        function animate() {
            ctx.clearRect(0, 0, c.width, c.height);
            petals.forEach(p => {
                drawPetal(p); p.x += p.vx; p.y += p.vy; p.rot += p.vr;
                p.vx += (Math.random() - .5) * .015;
                p.vx = Math.max(-1.5, Math.min(1.5, p.vx));
                if (p.y > c.height + 12) { p.y = -12; p.x = Math.random() * c.width; }
            });
            requestAnimationFrame(animate);
        }
        animate();
    })();

    /* ── Inject corner brackets + anime badge into login card ── */
    (function() {
        const card = document.getElementById('dialogue_popup');
        if (!card) return;
        ['tl','tr','bl','br'].forEach(pos => {
            const d = document.createElement('div');
            d.className = 'stc-corner ' + pos;
            card.appendChild(d);
        });
        // Inject anime badge before logo
        const logoBlock = document.getElementById('logoBlock');
        if (logoBlock) {
            const badge = document.createElement('div');
            badge.className = 'stc-anime-badge';
            badge.textContent = 'System Access';
            logoBlock.parentNode.insertBefore(badge, logoBlock);
        }
    })();


    /* STC login page logic */
    (async function() {
        const params = new URLSearchParams(location.search);
        const isExpired = params.get('reason') === 'expired';
        const expiredHandle = params.get('handle') || '';
        let purchaseLink = '';

        try {
            const configResp = await fetch('/api/stc/public-config/public-pages');
            if (configResp.ok) {
                const config = await configResp.json();
                purchaseLink = config.purchaseLink || '';
                const oauthSection = document.getElementById('stc-oauth-section');
                let hasOAuth = false;
                if (config.enableOAuthGithub)  { document.getElementById('oauth-github').style.display  = ''; hasOAuth = true; }
                if (config.enableOAuthDiscord) { document.getElementById('oauth-discord').style.display = ''; hasOAuth = true; }
                if (config.enableOAuthLinuxdo) { document.getElementById('oauth-linuxdo').style.display = ''; hasOAuth = true; }
                if (hasOAuth && !isExpired) oauthSection.style.display = '';
                if (purchaseLink) {
                    const link = document.getElementById('stc-purchase-link');
                    link.href = purchaseLink;
                    link.style.display = '';
                }
            }
        } catch {}

        if (isExpired) {
            const shadowPopup = document.getElementById('shadow_popup');
            if (shadowPopup) shadowPopup.style.opacity = '1';

            // 为避免受原始结构影响，这里直接重绘弹窗内容
            const container = document.getElementById('dialogue_popup_text');
            if (container) {
                const safeHandle = expiredHandle || '';
                const purchaseHtml = purchaseLink
                    ? `<a id="stc-buy-link" href="${purchaseLink}" class="stc-buy-btn" target="_blank">
                           <i class="fa-solid fa-cart-shopping"></i> 购买激活码
                       </a>`
                    : '';

                container.innerHTML = `
                    <div style="display:flex;flex-direction:column;align-items:center;gap:14px;">
                        <h2 id="logoBlock" class="flex-container" style="flex-direction:column;align-items:center;gap:8px;">
                            <img src="img/logo.png" alt="SillyTavern" class="logo">
                            <span>SillyTavern</span>
                        </h2>
                        <div class="stc-expired-header" style="width:100%;">
                            <span class="exp-icon"><i class="fa-solid fa-clock-rotate-left"></i></span>
                            <h3>账户使用时间已到期</h3>
                            <p id="stc-expired-desc">
                                账号 "${safeHandle || '当前账号'}" 的使用时间已到期，请使用新的激活码续费
                            </p>
                        </div>
                        <div class="stc-renew-form" style="width:100%;">
                            <input id="stc-renew-handle" type="text" placeholder="账号用户名" autocomplete="username" readonly
                                   value="${safeHandle}">
                            <input id="stc-renew-code-input" type="text" placeholder="输入激活码" autocomplete="off">
                            <button id="stc-renew-submit" class="btn-renew">
                                <i class="fa-solid fa-rotate-right"></i> 立即续费
                            </button>
                            ${purchaseHtml}
                            <div id="stc-renew-msg" class="stc-renew-msg"></div>
                        </div>
                        <div class="stc-back-login">
                            <a href="/login">← 使用其他账号登录</a>
                        </div>
                    </div>
                `;

                // 绑定续费按钮逻辑
                const renewBtn = document.getElementById('stc-renew-submit');
                if (renewBtn) {
                    renewBtn.addEventListener('click', async function() {
                        const handle = (document.getElementById('stc-renew-handle').value || '').trim();
                        const code   = (document.getElementById('stc-renew-code-input').value || '').trim();
                        const btn    = this;
                        if (!handle) { showMsg('请填写账号用户名', false); return; }
                        if (!code)   { showMsg('请输入激活码', false); return; }
                        btn.disabled = true;
                        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 续费中...';
                        const msgEl = document.getElementById('stc-renew-msg');
                        if (msgEl) msgEl.style.display = 'none';
                        try {
                            const r = await fetch('/api/stc/users/renew-expired', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ handle, inviteCode: code }),
                            });
                            const d = await r.json();
                            if (d.success) {
                                const expStr = d.expiresAt ? new Date(d.expiresAt).toLocaleDateString('zh-CN') : '永久';
                                showMsg(`续费成功！账户有效期至 ${expStr}，正在跳转登录...`, true);
                                setTimeout(() => { location.href = '/login'; }, 2000);
                            } else {
                                showMsg(d.error || '续费失败，请检查激活码', false);
                                btn.disabled = false;
                                btn.innerHTML = '<i class="fa-solid fa-rotate-right"></i> 立即续费';
                            }
                        } catch (e) {
                            showMsg('网络错误，请重试', false);
                            btn.disabled = false;
                            btn.innerHTML = '<i class="fa-solid fa-rotate-right"></i> 立即续费';
                        }
                    });
                }

                function showMsg(text, ok) {
                    const el = document.getElementById('stc-renew-msg');
                    if (!el) return;
                    el.className = 'stc-renew-msg ' + (ok ? 'ok' : 'err');
                    el.textContent = text;
                    el.style.display = '';
                }
            }
        }

        try {
            const annResp = await fetch('/api/stc/announcements/login/current');
            if (annResp.ok) {
                const announcements = await annResp.json();
                const container = document.getElementById('stc-announcements-container');
                if (announcements.length > 0) {
                    // Anime-style header
                    const header = document.createElement('div');
                    header.className = 'stc-ann-header';
                    header.textContent = 'Notice';
                    container.appendChild(header);
                    for (const ann of announcements) {
                        const div = document.createElement('div');
                        div.className = 'stc-announcement ' + (ann.type || 'info');
                        let html = '';
                        if (ann.title)   html += `<div class="ann-title">${ann.title}</div>`;
                        if (ann.content) html += `<div class="ann-body">${ann.content}</div>`;
                        div.innerHTML = html;
                        container.appendChild(div);
                    }
                }
            }
        } catch {}
    })();
    </script>
</body>
</html>
