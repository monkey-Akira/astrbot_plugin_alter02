<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, viewport-fit=cover, initial-scale=1, maximum-scale=1.0, user-scalable=no">
    <meta name="darkreader-lock">
    <base href="/">
    <title>SillyTavern - 公用角色卡</title>
    <link rel="stylesheet" href="css/fontawesome.min.css">
    <link rel="stylesheet" href="css/solid.min.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
/* ── Reset & Base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden;overflow-y:auto;scroll-behavior:smooth;color-scheme:dark}
body{font-family:'Noto Sans',sans-serif;background:rgb(23,23,23);color:rgb(220,220,210)}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:rgba(0,0,0,.2);border-radius:4px}
::-webkit-scrollbar-thumb{background:rgba(125,125,125,.5);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(125,125,125,.7)}

/* ── Container ── */
.public-characters-container{min-height:100vh;background:rgba(23,23,23,1);overflow-x:hidden}

/* ── Header ── */
.header{background:rgba(0,0,0,.4);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.08);padding:2rem 0}
.header-content{max-width:1200px;margin:0 auto;padding:0 2rem;text-align:center}
.header-title{font-size:2.8rem;font-weight:700;margin:0 0 .5rem;color:rgb(220,220,210)}
.header-subtitle{font-size:1.1rem;color:rgba(220,220,210,.6);margin:0 0 1.5rem}
.header-actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;align-items:center}
.user-info{display:flex;align-items:center;gap:1rem}
.user-greeting{color:rgba(220,220,210,.9);font-weight:500}
.login-prompt{display:flex;align-items:center;gap:1rem}
.login-text{color:rgba(220,220,210,.6);font-size:.9rem}

/* ── Buttons ── */
.btn{padding:12px 24px;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .3s;text-decoration:none;display:inline-flex;align-items:center;gap:.5rem;min-height:44px;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#4CAF50 0%,#45a049 100%);color:#fff;box-shadow:0 4px 15px rgba(76,175,80,.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(76,175,80,.4)}
.btn-secondary{background:rgba(0,0,0,.3);color:rgb(220,220,210);border:2px solid rgba(255,255,255,.12)}
.btn-secondary:hover{background:rgba(0,0,0,.5);border-color:rgba(255,255,255,.25);transform:translateY(-1px)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-danger{background:linear-gradient(135deg,#ff6b6b 0%,#ee5a52 100%);color:#fff}
.btn-danger:hover{background:linear-gradient(135deg,#ff5252 0%,#d32f2f 100%);transform:translateY(-2px);box-shadow:0 8px 25px rgba(255,107,107,.3)}
.btn-small{padding:6px 14px;font-size:.85rem;min-height:34px}

/* ── Search ── */
.search-section{padding:1.5rem 0;background:rgba(0,0,0,.2)}
.search-container{max-width:1200px;margin:0 auto;padding:0 2rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.search-box{flex:1;min-width:280px;position:relative}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:rgba(220,220,210,.5);z-index:1;pointer-events:none}
.search-input{width:100%;padding:11px 16px 11px 46px;background:rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.1);border-radius:8px;color:rgb(220,220,210);font-size:.95rem;outline:none;font-family:inherit;transition:all .3s}
.search-input::placeholder{color:rgba(220,220,210,.5)}
.search-input:focus{border-color:#4CAF50;box-shadow:0 0 0 3px rgba(76,175,80,.1)}
select.filter-select{padding:11px 14px;background:#1a1a1a;border:2px solid rgba(255,255,255,.1);border-radius:8px;color:rgb(220,220,210);font-size:.95rem;cursor:pointer;min-width:140px;outline:none;font-family:inherit;color-scheme:dark}
select.filter-select option{background:#1a1a1a;color:rgb(220,220,210)}
select.filter-select:focus{border-color:#4CAF50}

/* ── Grid ── */
.characters-grid{max-width:1200px;margin:0 auto;padding:2rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:2rem}
.character-card{background:rgba(0,0,0,.4);border-radius:16px;overflow:hidden;transition:all .3s;cursor:pointer;border:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column}
.character-card:hover{transform:translateY(-8px);box-shadow:0 16px 40px rgba(0,0,0,.7);border-color:rgba(76,175,80,.25)}
.character-avatar{width:100%;aspect-ratio:3/4;overflow:hidden;position:relative;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center}
.character-avatar img{width:100%;height:100%;object-fit:cover;object-position:top;transition:transform .3s}
.character-card:hover .character-avatar img{transform:scale(1.06)}
.char-no-avatar{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:rgba(220,220,210,.3);gap:8px}
.char-no-avatar i{font-size:3rem}
.char-no-avatar span{font-size:.8rem}
.character-info{padding:1.25rem;flex:1;display:flex;flex-direction:column}
.character-content{flex:1}
.character-name{font-size:1.15rem;font-weight:600;margin:0 0 .4rem;color:rgb(220,220,210)}
.character-description{color:rgba(220,220,210,.75);font-size:.88rem;line-height:1.5;margin:0 0 .8rem;display:-webkit-box;-webkit-line-clamp:3;line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.character-meta{display:flex;justify-content:space-between;align-items:center;font-size:.78rem;color:rgba(220,220,210,.55);margin-bottom:.75rem;flex-wrap:wrap;gap:.3rem}
.character-uploader,.character-date{display:flex;align-items:center;gap:.25rem}
.character-tags{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.5rem}
.character-tag{background:rgba(76,175,80,.18);color:#4CAF50;padding:2px 8px;border-radius:4px;font-size:.72rem;border:1px solid rgba(76,175,80,.3)}
.character-stats{display:flex;gap:12px;font-size:.8rem;color:rgba(220,220,210,.5);margin-bottom:.5rem}
.character-stats span{display:flex;align-items:center;gap:4px}
.star-rating{display:flex;align-items:center;gap:2px;font-size:.82rem;color:#fbbf24}
.character-actions{padding:0 1.25rem 1.25rem;display:flex;gap:.5rem}
.character-actions .btn{flex:1;padding:8px 10px;font-size:.85rem;min-height:38px;justify-content:center}

/* ── Load more ── */
.load-more-container{text-align:center;padding:2rem}

/* ── Modal ── */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(8px);padding:20px}
.modal-content{background:rgba(23,23,23,.97);border-radius:16px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;border:1px solid rgba(255,255,255,.1);box-shadow:0 24px 60px rgba(0,0,0,.8);scrollbar-width:thin;scrollbar-color:rgba(76,175,80,.3) transparent}
.modal-large{max-width:800px}
.modal-header{padding:1.5rem;border-bottom:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center}
.modal-header h2{margin:0;color:rgb(220,220,210);font-size:1.15rem}
.modal-close{background:none;border:none;color:rgba(220,220,210,.55);font-size:1.4rem;cursor:pointer;padding:0;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:all .3s}
.modal-close:hover{background:rgba(255,255,255,.08);color:rgb(220,220,210)}
.modal-body{padding:1.5rem}

/* ── Upload Form ── */
.upload-form{display:flex;flex-direction:column;gap:1.25rem}
.form-group{display:flex;flex-direction:column;gap:.45rem}
.form-label{font-weight:600;color:rgba(220,220,210,.85);font-size:.9rem}
.form-input,.form-textarea{padding:11px 14px;background:rgba(0,0,0,.4);border:2px solid rgba(255,255,255,.1);border-radius:8px;color:rgb(220,220,210);font-size:.95rem;outline:none;font-family:inherit;transition:all .3s;resize:vertical}
.form-input::placeholder,.form-textarea::placeholder{color:rgba(220,220,210,.4)}
.form-input:focus,.form-textarea:focus{border-color:#4CAF50;box-shadow:0 0 0 3px rgba(76,175,80,.1)}
.form-hint{font-size:.78rem;color:rgba(220,220,210,.5)}
.form-actions{display:flex;gap:1rem;margin-top:.5rem}
.form-actions .btn{flex:1}

/* ── Character Detail ── */
.character-detail{display:flex;gap:1.5rem;margin-bottom:1.5rem}
.detail-avatar{width:140px;height:140px;border-radius:12px;overflow:hidden;flex-shrink:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center}
.detail-avatar img{width:100%;height:100%;object-fit:cover;object-position:top}
.detail-info{flex:1}
.detail-info h3{font-size:1.35rem;margin:0 0 .6rem;color:rgb(220,220,210)}
.detail-info p{color:rgba(220,220,210,.75);line-height:1.6;margin:0 0 1rem;font-size:.9rem}
.meta-item{display:flex;align-items:center;gap:.45rem;color:rgba(220,220,210,.6);font-size:.85rem;margin-bottom:.35rem}
.detail-actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem}
.detail-actions .btn{min-width:160px;justify-content:center}
.detail-rate-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:.5rem;font-size:.9rem;color:rgba(220,220,210,.7)}
.rate-stars-input{display:flex;gap:4px}
.rate-star{font-size:1.2rem;cursor:pointer;color:rgba(220,220,210,.3);transition:color .2s}
.rate-star.active,.rate-star:hover{color:#fbbf24}
.rate-star:hover~.rate-star{color:rgba(220,220,210,.3)}

/* ── Comments (in modal) ── */
.comments-section{margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.08)}
.comments-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem}
.comments-header h3{margin:0;color:rgb(220,220,210);font-size:1.05rem;display:flex;align-items:center;gap:.4rem}
.comments-count{color:rgba(220,220,210,.55);font-size:.85rem}
.comment-input-section{margin-bottom:1.5rem;display:none}
.comment-input-box{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:1rem}
.comment-textarea,.reply-textarea{width:100%;min-height:72px;padding:10px 14px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:rgb(220,220,210);font-size:.92rem;font-family:inherit;resize:vertical;outline:none;transition:border-color .3s}
.comment-textarea::placeholder,.reply-textarea::placeholder{color:rgba(220,220,210,.4)}
.comment-textarea:focus,.reply-textarea:focus{border-color:#4CAF50}
.comment-input-actions,.reply-actions{display:flex;justify-content:flex-end;gap:.5rem;margin-top:.75rem}
.comment-login-prompt{margin-bottom:1.5rem}
.login-prompt-box{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:1.25rem;text-align:center;color:rgba(220,220,210,.6);display:flex;align-items:center;justify-content:center;gap:.75rem;flex-wrap:wrap;font-size:.88rem}
.login-prompt-box a{color:#4CAF50;text-decoration:none}
.comments-list{max-height:500px;overflow-y:auto;scrollbar-width:thin}
.no-comments{text-align:center;padding:2.5rem 1rem;color:rgba(220,220,210,.4)}
.no-comments p{margin:.5rem 0 0;font-size:.9rem}
.comment-item{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:1rem;margin-bottom:.85rem;transition:background .3s}
.comment-item:hover{background:rgba(0,0,0,.3)}
.comment-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;flex-wrap:wrap;gap:.4rem}
.comment-author-info{display:flex;align-items:center;gap:.45rem;color:rgba(220,220,210,.75);font-size:.85rem}
.author-name{font-weight:600;color:rgb(220,220,210)}
.comment-date{color:rgba(220,220,210,.45);font-size:.78rem}
.comment-actions-bar{display:flex;gap:.35rem}
.comment-reply,.comment-delete{background:none;border:none;color:rgba(220,220,210,.5);font-size:.78rem;cursor:pointer;padding:3px 7px;border-radius:4px;display:flex;align-items:center;gap:.25rem;font-family:inherit;transition:all .2s}
.comment-reply:hover{background:rgba(76,175,80,.18);color:#4CAF50}
.comment-delete:hover{background:rgba(255,107,107,.18);color:#ff6b7a}
.comment-content{color:rgb(220,220,210);line-height:1.6;font-size:.9rem;word-break:break-word;white-space:pre-wrap}
.comment-reply-input{margin-top:.75rem;padding:.85rem;background:rgba(0,0,0,.2);border-radius:7px;border:1px solid rgba(255,255,255,.07);display:none}
.reply-textarea{min-height:55px}
.comment-replies{margin-top:.75rem;border-left:2px solid rgba(76,175,80,.25);padding-left:.85rem}
.comment-replies .comment-item{background:rgba(0,0,0,.1)}

/* ── Loading ── */
.loading-indicator{display:none;flex-direction:column;align-items:center;justify-content:center;padding:3rem;color:rgba(220,220,210,.7)}
.spinner{width:38px;height:38px;border:4px solid rgba(76,175,80,.2);border-top:4px solid #4CAF50;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:1rem}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Responsive ── */
@media(max-width:768px){
    .header-title{font-size:2rem}
    .search-container{flex-direction:column;align-items:stretch}
    .search-box{min-width:auto}
    .characters-grid{grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem;padding:1rem}
    .character-detail{flex-direction:column}
    .detail-avatar{width:100px;height:100px;align-self:center}
    .modal-content{width:98%;margin:.5rem}
    .form-actions{flex-direction:column}
    .header-actions{flex-direction:column;align-items:center}
}
@media(max-width:480px){
    .characters-grid{grid-template-columns:1fr;padding:1rem}
    .character-actions{flex-direction:column}
}
    </style>
</head>
<body>
<div class="public-characters-container">

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1 class="header-title">公用角色卡库</h1>
            <p class="header-subtitle">发现和分享精彩的角色卡</p>
            <div class="header-actions">
                <button id="uploadButton" class="btn btn-primary" style="display:none" onclick="openUploadModal()">
                    <i class="fa-solid fa-upload"></i> 上传角色卡
                </button>
                <div id="userInfo" class="user-info" style="display:none">
                    <span class="user-greeting">欢迎，<span id="userName"></span></span>
                    <a href="/" class="btn btn-secondary">
                        <i class="fa-solid fa-user"></i> 我的角色库
                    </a>
                </div>
                <div id="loginPrompt" class="login-prompt">
                    <span class="login-text">登录后可以上传和导入角色卡</span>
                    <a href="/login" class="btn btn-secondary">
                        <i class="fa-solid fa-right-to-bracket"></i> 登录
                    </a>
                </div>
                <a href="/" class="btn btn-secondary">
                    <i class="fa-solid fa-house"></i> 返回主页
                </a>
            </div>
        </div>
    </header>

    <!-- Search -->
    <div class="search-section">
        <div class="search-container">
            <div class="search-box">
                <i class="fa-solid fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="搜索角色卡...">
            </div>
            <div class="filter-container">
                <select id="categoryFilter" class="filter-select">
                    <option value="">全部分类</option>
                    <option value="general">通用</option>
                    <option value="fantasy">奇幻</option>
                    <option value="scifi">科幻</option>
                    <option value="romance">言情</option>
                    <option value="action">动作</option>
                    <option value="horror">恐怖</option>
                    <option value="comedy">喜剧</option>
                    <option value="other">其他</option>
                </select>
                <select id="sortSelect" class="filter-select">
                    <option value="date">按上传时间</option>
                    <option value="downloads">按下载量</option>
                    <option value="rating">按评分</option>
                    <option value="name">按名称</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Grid -->
    <main class="characters-grid" id="charactersGrid"></main>

    <!-- Load more -->
    <div class="load-more-container">
        <button id="loadMoreButton" class="btn btn-secondary" style="display:none" onclick="loadMore()">
            <i class="fa-solid fa-arrow-down"></i> 加载更多
        </button>
    </div>

    <!-- Loading Indicator -->
    <div id="loadingIndicator" class="loading-indicator" style="display:flex">
        <div class="spinner"></div>
        <p>加载中...</p>
    </div>
</div>

<!-- Upload Modal -->
<div id="uploadModal" class="modal" style="display:none">
    <div class="modal-content">
        <div class="modal-header">
            <h2>上传角色卡</h2>
            <button class="modal-close" onclick="closeUploadModal()">&times;</button>
        </div>
        <div class="modal-body">
            <form id="uploadForm" class="upload-form">
                <div class="form-group">
                    <label class="form-label">选择角色卡文件 *</label>
                    <input type="file" id="characterFile" class="form-input" accept=".json,.png,.yaml,.yml" required>
                    <small class="form-hint">支持 JSON、PNG、YAML 格式</small>
                    <small class="form-hint">角色卡文件只用于服务端导入，不会作为公开展示图暴露</small>
                </div>
                <div class="form-group">
                    <label class="form-label">展示图</label>
                    <input type="file" id="previewImage" class="form-input" accept="image/png,image/jpeg,image/webp,image/gif">
                    <small class="form-hint">公开页面只显示这张 JPG 预览图，不暴露完整角色卡</small>
                </div>
                <div class="form-group">
                    <label class="form-label">角色名称 *</label>
                    <input type="text" id="characterName" class="form-input" placeholder="请输入角色名称" required>
                </div>
                <div class="form-group">
                    <label class="form-label">角色描述</label>
                    <textarea id="characterDescription" class="form-textarea" placeholder="请输入角色描述（可选）" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">分类</label>
                    <select id="uploadCategory" class="form-input" style="cursor:pointer">
                        <option value="general">通用</option>
                        <option value="fantasy">奇幻</option>
                        <option value="scifi">科幻</option>
                        <option value="romance">言情</option>
                        <option value="action">动作</option>
                        <option value="horror">恐怖</option>
                        <option value="comedy">喜剧</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">标签（逗号分隔）</label>
                    <input type="text" id="characterTags" class="form-input" placeholder="例如：冒险,魔法,少女">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeUploadModal()">取消</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-upload"></i> 上传
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Character Detail Modal -->
<div id="characterModal" class="modal" style="display:none">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h2 id="characterModalTitle">角色卡详情</h2>
            <button class="modal-close" id="closeCharacterModal">&times;</button>
        </div>
        <div class="modal-body">
            <div class="character-detail">
                <div class="detail-avatar" id="detailAvatarWrap">
                    <img id="charDetailAvatar" src="" alt="角色" style="display:none;width:100%;height:100%;object-fit:cover;object-position:top" onerror="this.style.display='none';document.getElementById('detailAvatarFallback').style.display='flex'">
                    <div id="detailAvatarFallback" style="display:flex;align-items:center;justify-content:center;width:100%;height:100%"><i class="fa-solid fa-user" style="font-size:3rem;color:rgba(220,220,210,.3)"></i></div>
                </div>
                <div class="detail-info">
                    <h3 id="charDetailName"></h3>
                    <p id="charDetailDesc"></p>
                    <div class="meta-item"><i class="fa-solid fa-user"></i><span>上传者：<span id="charDetailUploader"></span></span></div>
                    <div class="meta-item"><i class="fa-solid fa-calendar"></i><span>上传时间：<span id="charDetailDate"></span></span></div>
                    <div class="meta-item"><i class="fa-solid fa-download"></i><span>下载次数：<span id="charDetailDownloads"></span></span></div>
                    <div class="meta-item" id="charDetailRatingRow" style="display:none">
                        <i class="fa-solid fa-star" style="color:#fbbf24"></i>
                        <span>评分：<span id="charDetailRating"></span></span>
                    </div>
                    <div class="character-tags" id="charDetailTags" style="margin-top:.6rem"></div>
                </div>
            </div>

            <!-- Actions -->
            <div class="detail-actions">
                <button id="importCharBtn" class="btn btn-primary" onclick="importCurrentChar()">
                    <i class="fa-solid fa-download"></i> 导入到我的角色库
                </button>
                <button id="deleteCharBtn" class="btn btn-danger" style="display:none" onclick="deleteCurrentChar()">
                    <i class="fa-solid fa-trash"></i> 删除
                </button>
            </div>

            <!-- Rating -->
            <div class="detail-rate-row" id="rateRow" style="display:none">
                <span>为这个角色卡评分：</span>
                <div class="rate-stars-input" id="rateStars">
                    <span class="rate-star" data-v="1">★</span>
                    <span class="rate-star" data-v="2">★</span>
                    <span class="rate-star" data-v="3">★</span>
                    <span class="rate-star" data-v="4">★</span>
                    <span class="rate-star" data-v="5">★</span>
                </div>
            </div>

            <!-- Comments -->
            <div class="comments-section">
                <div class="comments-header">
                    <h3><i class="fa-solid fa-comments"></i> 评论讨论</h3>
                    <span class="comments-count" id="commentsCount">0 条评论</span>
                </div>
                <div class="comment-input-section" id="commentInputSection">
                    <div class="comment-input-box">
                        <textarea id="commentInput" class="comment-textarea" placeholder="写下你对这个角色卡的看法..." rows="3"></textarea>
                        <div class="comment-input-actions">
                            <button class="btn btn-primary btn-small" onclick="submitComment()">
                                <i class="fa-solid fa-paper-plane"></i> 发表评论
                            </button>
                        </div>
                    </div>
                </div>
                <div class="comment-login-prompt" id="commentLoginPrompt">
                    <div class="login-prompt-box">
                        <i class="fa-solid fa-lock"></i>
                        <span>登录后可以参与评论讨论</span>
                        <a href="/login" class="btn btn-secondary btn-small">登录</a>
                    </div>
                </div>
                <div class="comments-list" id="commentsList"></div>
            </div>
        </div>
    </div>
</div>

<script>
/* ─────────────────────────────────────────
   State
───────────────────────────────────────── */
let isLoggedIn = false;
let currentUser = null;
let allCharacters = [];
let filteredChars = [];
let currentPage = 0;
const PAGE_SIZE = 12;
let currentCharId = null;
let comments = [];
let autoNameId = 0;

/* ─────────────────────────────────────────
   Auth
───────────────────────────────────────── */
async function checkLoginStatus() {
    try {
        const r = await fetch('/api/users/me', { method:'GET', credentials:'include', headers:{'Accept':'application/json'} });
        if (r.ok) { currentUser=await r.json(); isLoggedIn=true; }
        else { isLoggedIn=false; currentUser=null; }
    } catch { isLoggedIn=false; currentUser=null; }
}
function updateUIForLoginStatus() {
    if (isLoggedIn) {
        document.getElementById('uploadButton').style.display='';
        document.getElementById('userInfo').style.display='flex';
        document.getElementById('loginPrompt').style.display='none';
        if (currentUser) document.getElementById('userName').textContent=currentUser.name||currentUser.handle;
    } else {
        document.getElementById('uploadButton').style.display='none';
        document.getElementById('userInfo').style.display='none';
        document.getElementById('loginPrompt').style.display='flex';
    }
}

/* ─────────────────────────────────────────
   Load characters
───────────────────────────────────────── */
async function loadCharacters() {
    showLoading();
    try {
        const r = await fetch('/api/stc/public-characters/list?page=1&limit=500', { credentials:'include' });
        if (!r.ok) { showError('加载失败：'+r.status); return; }
        const data = await r.json();
        allCharacters = data.characters || [];
        filterCharacters();
    } catch(e) { showError('加载失败：'+e.message); }
    finally { hideLoading(); }
}

function filterCharacters() {
    const search = document.getElementById('searchInput').value.toLowerCase().trim();
    const cat = document.getElementById('categoryFilter').value;
    const sort = document.getElementById('sortSelect').value;
    filteredChars = allCharacters.filter(c => {
        if (cat && c.category!==cat) return false;
        if (search) return c.name?.toLowerCase().includes(search)||c.description?.toLowerCase().includes(search)||(c.tags||[]).some(t=>t.toLowerCase().includes(search))||c.sharedByName?.toLowerCase().includes(search);
        return true;
    });
    filteredChars.sort((a,b)=>{
        if(sort==='downloads') return (b.downloads||0)-(a.downloads||0);
        if(sort==='rating') return avgRating(b.ratings)-avgRating(a.ratings);
        if(sort==='name') return a.name.localeCompare(b.name);
        return b.createdAt-a.createdAt;
    });
    currentPage=0;
    renderCharacters();
}

function avgRating(ratings) {
    if(!ratings||!ratings.length) return 0;
    return ratings.reduce((s,r)=>s+r.rating,0)/ratings.length;
}

function renderCharacters() {
    const grid = document.getElementById('charactersGrid');
    grid.innerHTML='';
    const slice = filteredChars.slice(0,PAGE_SIZE);
    if(!slice.length){
        grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:3rem;color:rgba(220,220,210,.5)"><i class="fa-solid fa-search" style="font-size:3rem;display:block;margin-bottom:1rem"></i><h3>暂无角色卡</h3><p>快来上传第一个吧！</p></div>`;
        document.getElementById('loadMoreButton').style.display='none';
        return;
    }
    slice.forEach(c=>grid.insertAdjacentHTML('beforeend',createCharCard(c)));
    updateLoadMore();
}

function appendMoreCharacters() {
    const start=(currentPage+1)*PAGE_SIZE, end=start+PAGE_SIZE;
    const more=filteredChars.slice(start,end);
    if(!more.length){ document.getElementById('loadMoreButton').style.display='none'; return; }
    more.forEach(c=>document.getElementById('charactersGrid').insertAdjacentHTML('beforeend',createCharCard(c)));
    currentPage++;
    updateLoadMore();
}

function updateLoadMore() {
    const loaded=(currentPage+1)*PAGE_SIZE;
    document.getElementById('loadMoreButton').style.display=loaded<filteredChars.length?'':'none';
}

function loadMore() {
    const btn=document.getElementById('loadMoreButton');
    btn.disabled=true;
    btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> 加载中...';
    setTimeout(()=>{ appendMoreCharacters(); btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-arrow-down"></i> 加载更多'; },200);
}

function createCharCard(c) {
    const avg=avgRating(c.ratings);
    const stars=avg?`<div class="star-rating">${'★'.repeat(Math.round(avg))}${'☆'.repeat(5-Math.round(avg))} ${avg.toFixed(1)}</div>`:'';
    const tagsHtml=(c.tags||[]).slice(0,3).map(t=>`<span class="character-tag">${esc(t)}</span>`).join('');
    const canDel=isLoggedIn&&(currentUser?.admin||c.sharedBy===currentUser?.handle);
    const delBtn=canDel?`<button class="btn btn-danger" onclick="deleteCharacter('${c.id}','${esc(c.name)}')"><i class="fa-solid fa-trash"></i> 删除</button>`:'';
    const importBtn=isLoggedIn
        ?`<button class="btn btn-primary import-btn" onclick="importCharacter('${c.id}')"><i class="fa-solid fa-download"></i> 导入</button>`
        :`<button class="btn btn-secondary import-btn" disabled><i class="fa-solid fa-lock"></i> 登录导入</button>`;
    const avatarHtml = c.avatar
        ? `<img src="/api/stc/public-characters/avatar/${c.id}" alt="${esc(c.name)}" style="width:100%;height:100%;object-fit:cover;object-position:top" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          +`<div class="char-no-avatar" style="display:none"><i class="fa-solid fa-user"></i><span>${esc(c.name)}</span></div>`
        : `<div class="char-no-avatar"><i class="fa-solid fa-user"></i><span>${esc(c.name)}</span></div>`;
    return `<div class="character-card">
        <div class="character-avatar" onclick="viewCharacter('${c.id}')">
            ${avatarHtml}
        </div>
        <div class="character-info" onclick="viewCharacter('${c.id}')">
            <div class="character-content">
                <h3 class="character-name">${esc(c.name)}</h3>
                <p class="character-description">${esc(c.description||'暂无描述')}</p>
            </div>
            <div class="character-footer">
                <div class="character-meta">
                    <span class="character-uploader"><i class="fa-solid fa-user"></i>${esc(c.sharedByName||c.sharedBy)}</span>
                    <span class="character-date"><i class="fa-solid fa-calendar"></i>${fmtDate(c.createdAt)}</span>
                </div>
                <div class="character-stats">
                    <span><i class="fa-solid fa-download"></i>${c.downloads||0}</span>
                    ${avg?`<span>${stars}</span>`:''}
                </div>
                ${tagsHtml?`<div class="character-tags">${tagsHtml}</div>`:''}
            </div>
        </div>
        <div class="character-actions">
            ${importBtn}
            <button class="btn btn-secondary view-btn" onclick="viewCharacter('${c.id}')"><i class="fa-solid fa-eye"></i> 查看</button>
            ${delBtn}
        </div>
    </div>`;
}

/* ─────────────────────────────────────────
   Import character
───────────────────────────────────────── */
async function getCsrfToken() {
    try {
        const r = await fetch('/csrf-token', { credentials:'include' });
        if (r.ok) return (await r.json()).token;
    } catch {}
    return null;
}

async function importCharacter(charId) {
    if (!isLoggedIn) { alert('请先登录后再导入角色卡'); return; }
    const btns = /** @type {HTMLButtonElement[]} */([...document.querySelectorAll(`[onclick="importCharacter('${charId}')"]`), document.getElementById('importCharBtn')].filter(Boolean));
    btns.forEach(b=>{ b.disabled=true; b.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> 导入中...'; });
    try {
        const r = await fetch(`/api/stc/public-characters/import/${charId}`, { method:'POST', credentials:'include' });
        if (!r.ok) { const d=await r.json(); throw new Error(d.error||'导入失败'); }
        const d = await r.json();
        alert(`角色卡已成功导入到您的角色库！\n请刷新主页角色列表查看。`);
        // Update local download count
        const ci=allCharacters.findIndex(c=>c.id===charId);
        if(ci>=0) allCharacters[ci].downloads=(allCharacters[ci].downloads||0)+1;
    } catch(e) { alert('导入失败：'+e.message); }
    finally {
        btns.forEach(b=>{ b.disabled=false; b.innerHTML='<i class="fa-solid fa-download"></i> 导入'; });
        const modalBtn=document.getElementById('importCharBtn');
        if(modalBtn) modalBtn.innerHTML='<i class="fa-solid fa-download"></i> 导入到我的角色库';
    }
}

/* ─────────────────────────────────────────
   View / Delete
───────────────────────────────────────── */
function viewCharacter(charId) {
    currentCharId=charId;
    const c=allCharacters.find(x=>x.id===charId);
    if(!c) { console.warn('[stc] viewCharacter: not found', charId); return; }

    // Basic info
    document.getElementById('characterModalTitle').textContent=c.name;
    document.getElementById('charDetailName').textContent=c.name;
    document.getElementById('charDetailDesc').textContent=c.description||'暂无描述';
    document.getElementById('charDetailUploader').textContent=c.sharedByName||c.sharedBy;
    document.getElementById('charDetailDate').textContent=new Date(c.createdAt).toLocaleString('zh-CN');
    document.getElementById('charDetailDownloads').textContent=c.downloads||0;

    // Avatar — safe toggle without destroying DOM nodes
    const avatarImg=document.getElementById('charDetailAvatar');
    const avatarFallback=document.getElementById('detailAvatarFallback');
    if(c.avatar){
        avatarImg.src=`/api/stc/public-characters/avatar/${c.id}`;
        avatarImg.style.display='';
        avatarFallback.style.display='none';
    } else {
        avatarImg.src=''; avatarImg.style.display='none';
        avatarFallback.style.display='flex';
    }

    // Rating display
    const avg=avgRating(c.ratings);
    if(avg){
        document.getElementById('charDetailRatingRow').style.display='flex';
        document.getElementById('charDetailRating').textContent=`${'★'.repeat(Math.round(avg))}${'☆'.repeat(5-Math.round(avg))} ${avg.toFixed(1)} (${c.ratings.length}人)`;
    } else { document.getElementById('charDetailRatingRow').style.display='none'; }

    // Tags
    document.getElementById('charDetailTags').innerHTML=(c.tags||[]).map(t=>`<span class="character-tag">${esc(t)}</span>`).join('');

    // Buttons
    const importBtn=document.getElementById('importCharBtn');
    if(isLoggedIn){ importBtn.disabled=false; importBtn.innerHTML='<i class="fa-solid fa-download"></i> 导入到我的角色库'; }
    else { importBtn.disabled=true; importBtn.innerHTML='<i class="fa-solid fa-lock"></i> 登录后导入'; }

    const canDel=isLoggedIn&&(currentUser?.admin||c.sharedBy===currentUser?.handle);
    document.getElementById('deleteCharBtn').style.display=canDel?'':'none';
    document.getElementById('rateRow').style.display=isLoggedIn?'flex':'none';

    if(isLoggedIn&&currentUser){
        const myRating=(c.ratings||[]).find(r=>r.handle===currentUser.handle)?.rating||0;
        document.querySelectorAll('.rate-star').forEach(s=>s.classList.toggle('active',parseInt(s.dataset.v)<=myRating));
    }

    // Show modal immediately, load comments async in background
    updateCommentsSection();
    document.getElementById('commentsList').innerHTML='<p style="text-align:center;color:rgba(220,220,210,.4);padding:16px">加载评论中...</p>';
    document.getElementById('characterModal').style.display='flex';
    loadComments(charId); // non-blocking
}

async function importCurrentChar() {
    if(currentCharId) await importCharacter(currentCharId);
}

async function deleteCharacter(charId, charName) {
    if(!isLoggedIn){ alert('请先登录'); return; }
    if(!confirm(`确定要删除角色卡 "${charName}" 吗？`)) return;
    try {
        const r=await fetch(`/api/stc/public-characters/delete/${charId}`,{method:'POST',credentials:'include'});
        if(!r.ok){ const d=await r.json(); throw new Error(d.error||'删除失败'); }
        alert('删除成功！');
        await loadCharacters();
        document.getElementById('characterModal').style.display='none';
    } catch(e){ alert('删除失败：'+e.message); }
}

async function deleteCurrentChar() {
    const c=allCharacters.find(x=>x.id===currentCharId);
    if(c) await deleteCharacter(c.id,c.name);
}

/* ─────────────────────────────────────────
   Rating
───────────────────────────────────────── */
document.getElementById('rateStars').addEventListener('click', async e=>{
    const star=e.target.closest('.rate-star');
    if(!star||!isLoggedIn) return;
    const val=parseInt(star.dataset.v);
    try {
        const r=await fetch(`/api/stc/public-characters/rate/${currentCharId}`,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({rating:val})});
        if(!r.ok) throw new Error('评分失败');
        const d=await r.json();
        document.querySelectorAll('.rate-star').forEach(s=>s.classList.toggle('active',parseInt(s.dataset.v)<=val));
        const ci=allCharacters.findIndex(x=>x.id===currentCharId);
        if(ci>=0){
            const handle=currentUser.handle;
            const existing=(allCharacters[ci].ratings||[]).findIndex(r=>r.handle===handle);
            if(existing>=0) allCharacters[ci].ratings[existing].rating=val;
            else allCharacters[ci].ratings.push({handle,rating:val,createdAt:Date.now()});
        }
        alert(`评分 ${val} 星已提交！平均：${d.avgRating} 星`);
    } catch(e){ alert(e.message); }
});
// Star hover effect
document.getElementById('rateStars').addEventListener('mouseover', e=>{
    const star=e.target.closest('.rate-star');
    if(!star) return;
    const v=parseInt(star.dataset.v);
    document.querySelectorAll('.rate-star').forEach(s=>{
        s.style.color=parseInt(s.dataset.v)<=v?'#fbbf24':'rgba(220,220,210,.3)';
    });
});
document.getElementById('rateStars').addEventListener('mouseleave', ()=>{
    document.querySelectorAll('.rate-star').forEach(s=>{
        s.style.color='';
    });
});

/* ─────────────────────────────────────────
   Comments
───────────────────────────────────────── */
function updateCommentsSection() {
    document.getElementById('commentInputSection').style.display=isLoggedIn?'block':'none';
    document.getElementById('commentLoginPrompt').style.display=isLoggedIn?'none':'block';
}

async function loadComments(charId) {
    try {
        const r=await fetch(`/api/stc/public-characters/${charId}/comments`,{credentials:'include'});
        if(!r.ok) { comments=[]; renderComments(); return; }
        comments=await r.json();
        renderComments();
        updateCommentsCount();
    } catch { comments=[]; renderComments(); }
}

function renderComments() {
    const list=document.getElementById('commentsList');
    list.innerHTML='';
    if(!comments.length){
        list.innerHTML=`<div class="no-comments"><i class="fa-solid fa-comment" style="font-size:2rem;display:block;margin-bottom:.5rem"></i><p>还没有评论，来发表第一条吧！</p></div>`;
        return;
    }
    const topLevel=comments.filter(c=>!c.parentId);
    topLevel.forEach(c=>list.insertAdjacentHTML('beforeend',createCommentEl(c,0)));
}

function createCommentEl(c, depth) {
    const isAuthor=isLoggedIn&&currentUser&&c.author.handle===currentUser.handle;
    const isAdmin=isLoggedIn&&currentUser&&currentUser.admin;
    const canDel=isAuthor||isAdmin;
    const delBtn=canDel?`<button class="comment-delete" onclick="deleteComment('${c.id}')"><i class="fa-solid fa-trash"></i> 删除</button>`:'';
    const replyBtn=isLoggedIn?`<button class="comment-reply" onclick="showReplyInput('${c.id}')"><i class="fa-solid fa-reply"></i> 回复</button>`:'';
    const replies=(c.replies||[]).map(r=>createCommentEl(r,depth+1)).join('');
    const repliesHtml=replies?`<div class="comment-replies">${replies}</div>`:'';
    return `<div class="comment-item" data-comment-id="${c.id}" style="${depth>0?'margin-left:0':''}">
        <div class="comment-header">
            <div class="comment-author-info">
                <i class="fa-solid fa-${depth?'reply':'user'}"></i>
                <span class="author-name">${esc(c.author.name||c.author.handle)}</span>
                <span class="comment-date">${relTime(c.createdAt||c.created_at)}</span>
            </div>
            <div class="comment-actions-bar">${replyBtn}${delBtn}</div>
        </div>
        <div class="comment-content">${esc(c.content)}</div>
        <div class="comment-reply-input" id="replyInput_${c.id}">
            <textarea class="reply-textarea" placeholder="回复 ${esc(c.author.name||c.author.handle)}..." rows="2"></textarea>
            <div class="reply-actions">
                <button class="btn btn-secondary btn-small" onclick="cancelReply('${c.id}')">取消</button>
                <button class="btn btn-primary btn-small" onclick="submitReply('${c.id}')"><i class="fa-solid fa-paper-plane"></i> 回复</button>
            </div>
        </div>
        ${repliesHtml}
    </div>`;
}

function updateCommentsCount() {
    let count=0;
    function cnt(list){ (list||[]).forEach(c=>{ count++; cnt(c.replies); }); }
    cnt(comments);
    document.getElementById('commentsCount').textContent=`${count} 条评论`;
}

async function submitComment() {
    if(!isLoggedIn){ alert('请先登录'); return; }
    const content=document.getElementById('commentInput').value.trim();
    if(!content){ alert('请输入评论内容'); return; }
    try {
        const r=await fetch(`/api/stc/public-characters/${currentCharId}/comments`,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({content})});
        if(!r.ok){ const d=await r.json(); throw new Error(d.error||'评论失败'); }
        document.getElementById('commentInput').value='';
        await loadComments(currentCharId);
        alert('评论发表成功！');
    } catch(e){ alert('发表评论失败：'+e.message); }
}

function showReplyInput(commentId) {
    if(!isLoggedIn){ alert('请先登录'); return; }
    document.querySelectorAll('.comment-reply-input').forEach(el=>el.style.display='none');
    const el=document.getElementById(`replyInput_${commentId}`);
    if(el){ el.style.display='block'; el.querySelector('textarea')?.focus(); }
}
function cancelReply(commentId) {
    const el=document.getElementById(`replyInput_${commentId}`);
    if(el){ el.style.display='none'; el.querySelector('textarea').value=''; }
}

async function submitReply(parentId) {
    if(!isLoggedIn){ alert('请先登录'); return; }
    const content=document.getElementById(`replyInput_${parentId}`)?.querySelector('textarea')?.value.trim();
    if(!content){ alert('请输入回复内容'); return; }
    try {
        const r=await fetch(`/api/stc/public-characters/${currentCharId}/comments`,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({content,parentId})});
        if(!r.ok){ const d=await r.json(); throw new Error(d.error||'回复失败'); }
        cancelReply(parentId);
        await loadComments(currentCharId);
        alert('回复发表成功！');
    } catch(e){ alert('回复失败：'+e.message); }
}

async function deleteComment(commentId) {
    if(!isLoggedIn){ alert('请先登录'); return; }
    if(!confirm('确定要删除这条评论吗？')) return;
    try {
        const r=await fetch(`/api/stc/public-characters/${currentCharId}/comments/${commentId}`,{method:'DELETE',credentials:'include'});
        if(!r.ok){ const d=await r.json(); throw new Error(d.error||'删除失败'); }
        await loadComments(currentCharId);
        alert('评论删除成功！');
    } catch(e){ alert('删除失败：'+e.message); }
}

/* ─────────────────────────────────────────
   Upload Modal
───────────────────────────────────────── */
function openUploadModal() {
    if(!isLoggedIn){ alert('请先登录后再上传角色卡'); return; }
    document.getElementById('uploadModal').style.display='flex';
}
function closeUploadModal() {
    document.getElementById('uploadModal').style.display='none';
    document.getElementById('uploadForm').reset();
}

function makeJpegPreview(file) {
    return new Promise((resolve, reject) => {
        if (!file?.type?.startsWith('image/')) return reject(new Error('展示图必须是图片文件'));
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
            try {
                const maxSize = 768;
                const scale = Math.min(1, maxSize / Math.max(img.naturalWidth || img.width, img.naturalHeight || img.height));
                const width = Math.max(1, Math.round((img.naturalWidth || img.width) * scale));
                const height = Math.max(1, Math.round((img.naturalHeight || img.height) * scale));
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#111';
                ctx.fillRect(0, 0, width, height);
                ctx.drawImage(img, 0, 0, width, height);
                URL.revokeObjectURL(url);
                resolve(canvas.toDataURL('image/jpeg', 0.88));
            } catch (error) {
                URL.revokeObjectURL(url);
                reject(error);
            }
        };
        img.onerror = () => {
            URL.revokeObjectURL(url);
            reject(new Error('展示图读取失败'));
        };
        img.src = url;
    });
}

document.getElementById('characterFile').addEventListener('change', async function() {
    const file=this.files?.[0]; if(!file) return;
    // Pre-fill name from filename
    const nameWithoutExt=file.name.replace(/\.[^/.]+$/,'');
    document.getElementById('characterName').value=nameWithoutExt;
    // Try to extract name from file
    const requestId=++autoNameId;
    try {
        const extracted=await getCharacterNameFromFile(file);
        if(extracted&&requestId===autoNameId) document.getElementById('characterName').value=extracted;
    } catch {}
});

document.getElementById('uploadForm').addEventListener('submit', async e => {
    e.preventDefault();
    if(!isLoggedIn){ alert('请先登录'); return; }
    const fileInput=document.getElementById('characterFile');
    const file=fileInput.files?.[0];
    const name=document.getElementById('characterName').value.trim();
    if(!file){ alert('请选择角色卡文件'); return; }
    if(!name){ alert('请输入角色名称'); return; }
    const submitBtn=e.target.querySelector('[type="submit"]');
    submitBtn.disabled=true; submitBtn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> 上传中...';
    try {
        const ext=(file.name.split('.').pop()||'').toLowerCase();
        const tags=document.getElementById('characterTags').value.split(',').map(t=>t.trim()).filter(Boolean);
        const previewFile=document.getElementById('previewImage').files?.[0] || (file.type.startsWith('image/') ? file : null);
        if(!previewFile){ alert('请上传展示图，JSON/YAML 角色卡不能自动生成预览图'); return; }
        const previewDataUrl=await makeJpegPreview(previewFile);
        // Use FormData — backend uses global multer (field: avatar)
        const formData=new FormData();
        formData.append('avatar', file, file.name);
        formData.append('name', name);
        formData.append('description', document.getElementById('characterDescription').value.trim());
        formData.append('category', document.getElementById('uploadCategory').value);
        formData.append('tags', JSON.stringify(tags));
        formData.append('file_type', ext);
        formData.append('preview_image_data_url', previewDataUrl);
        const r=await fetch('/api/stc/public-characters/share',{method:'POST',credentials:'include',body:formData});
        if(!r.ok){ const d=await r.json(); throw new Error(d.error||'上传失败'); }
        closeUploadModal();
        await loadCharacters();
        alert(`角色卡 "${name}" 上传成功！`);
    } catch(e){ alert('上传失败：'+e.message); }
    finally{ submitBtn.disabled=false; submitBtn.innerHTML='<i class="fa-solid fa-upload"></i> 上传'; }
});

/* ─────────────────────────────────────────
   File parsing (from original)
───────────────────────────────────────── */
async function getCharacterNameFromFile(file) {
    const ext=file.name.split('.').pop()?.toLowerCase()||'';
    if(ext==='json'){const t=await readFileAsText(file);return extractNameFromCharData(parseJsonSafe(t));}
    if(ext==='png'){const buf=await readFileAsArrayBuffer(file);return extractNameFromPng(buf);}
    return null;
}
function parseJsonSafe(text){try{return JSON.parse(text);}catch{return null;}}
function extractNameFromCharData(data){
    const n=data?.data?.name||data?.name||data?.char_name;
    if(typeof n!=='string') return null;
    const t=n.trim();return t.length?t:null;
}
async function parsePngCard(buffer){
    const data=new Uint8Array(buffer);
    if(data.length<8) return null;
    if(data[0]!==137||data[1]!==80||data[2]!==78||data[3]!==71) return null;
    let offset=8;
    let charaText=null;
    while(offset+8<=data.length){
        const length=readUint32(data,offset);
        const type=decodeLatin1(data.slice(offset+4,offset+8));
        const ds=offset+8,de=ds+length;
        if(de>data.length) break;
        if(type==='tEXt'){
            const chunk=data.slice(ds,de);
            const ni=chunk.indexOf(0);
            if(ni>-1){
                const kw=decodeLatin1(chunk.slice(0,ni)).toLowerCase();
                const txt=decodeLatin1(chunk.slice(ni+1));
                if(kw==='chara'&&!charaText) charaText=txt;
                if(kw==='ccv3'){ const parsed=parseBase64Card(txt); if(parsed) return parsed; }
            }
        }
        offset=de+4;
        if(type==='IEND') break;
    }
    return charaText?parseBase64Card(charaText):null;
}
function parseBase64Card(base64){
    try{const bin=atob(base64.replace(/\s+/g,''));const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return JSON.parse(new TextDecoder('utf-8').decode(bytes));}catch{return null;}
}
function extractNameFromPng(buffer){const card=parsePngCardSync(buffer);return extractNameFromCharData(card);}
function parsePngCardSync(buffer){
    const data=new Uint8Array(buffer);
    if(data.length<8||data[0]!==137) return null;
    let offset=8,charaText=null;
    while(offset+8<=data.length){
        const len=readUint32(data,offset);const type=decodeLatin1(data.slice(offset+4,offset+8));const ds=offset+8,de=ds+len;
        if(de>data.length) break;
        if(type==='tEXt'){const chunk=data.slice(ds,de);const ni=chunk.indexOf(0);if(ni>-1){const kw=decodeLatin1(chunk.slice(0,ni)).toLowerCase();const txt=decodeLatin1(chunk.slice(ni+1));if(kw==='chara'&&!charaText)charaText=txt;}}
        offset=de+4;if(type==='IEND')break;
    }
    return charaText?parseBase64Card(charaText):null;
}
function readUint32(d,o){return((d[o]<<24)|(d[o+1]<<16)|(d[o+2]<<8)|d[o+3])>>>0;}
function decodeLatin1(bytes){return new TextDecoder('latin1').decode(bytes);}
function readFileAsText(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result||''));r.onerror=()=>rej(r.error);r.readAsText(file);});}
function readFileAsArrayBuffer(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(r.error);r.readAsArrayBuffer(file);});}

/* ─────────────────────────────────────────
   Helpers
───────────────────────────────────────── */
function esc(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}
function fmtDate(ts){return new Date(Number(ts)).toLocaleDateString('zh-CN',{year:'numeric',month:'short',day:'numeric'});}
function relTime(ts){
    const sec=Math.floor((Date.now()-Number(ts))/1000);
    if(sec<60)return '刚刚';if(sec<3600)return Math.floor(sec/60)+'分钟前';
    if(sec<86400)return Math.floor(sec/3600)+'小时前';if(sec<2592000)return Math.floor(sec/86400)+'天前';
    return fmtDate(ts);
}
function showLoading(){document.getElementById('loadingIndicator').style.display='flex';}
function hideLoading(){document.getElementById('loadingIndicator').style.display='none';}
function showError(msg){alert(msg);}
