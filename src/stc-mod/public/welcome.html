<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <base href="/">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">
    <meta name="darkreader-lock">
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="webfonts/NotoSans/stylesheet.css" rel="stylesheet">
    <link href="css/fontawesome.min.css" rel="stylesheet">
    <link href="css/solid.min.css" rel="stylesheet">
    <title>SillyTavern</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: #06040f;
            color: #eee;
        }

        /* Allow scrolling on mobile when content overflows */
        @media (max-width: 1023px) {
            body {
                overflow-y: auto;
                overflow-x: hidden;
                align-items: flex-start;
                padding: 20px 0;
            }
        }

        /* Prevent scrolling on desktop */
        @media (min-width: 1024px) {
            body {
                overflow: hidden;
            }
        }

        /* ── Video BG ── */
        #stc-bg-video {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: 0; pointer-events: none;
        }
        #stc-bg-overlay {
            position: fixed; inset: 0; z-index: 1;
            background: rgba(6, 3, 20, 0.52);
        }

        /* Sakura canvas */
        #stc-sakura { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

        /* ── Glass card ── */
        .card {
            position: relative; z-index: 3;
            background: rgba(255, 255, 255, 0.055);
            backdrop-filter: blur(36px);
            -webkit-backdrop-filter: blur(36px);
            border: 1px solid rgba(220, 160, 255, 0.22);
            border-radius: 28px;
            padding: 52px 48px 44px;
            width: 100%; max-width: 520px;
            box-shadow:
                0 0 0 1px rgba(255, 160, 220, 0.06) inset,
                0 0 60px rgba(108, 99, 255, 0.18),
                0 24px 80px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeUp .6s cubic-bezier(.22,1,.36,1) both;
            overflow: hidden;
        }
        /* Inner shimmer */
        .card::before {
            content: '';
            position: absolute; inset: 0; border-radius: inherit;
            background: linear-gradient(135deg,
                rgba(255, 160, 220, 0.06) 0%,
                transparent 45%,
                rgba(108, 99, 255, 0.05) 100%);
            pointer-events: none; z-index: 0;
        }
        /* Scan line effect */
        .card::after {
            content: '';
            position: absolute; inset: 0; border-radius: inherit;
            background: repeating-linear-gradient(
                0deg,
                transparent, transparent 3px,
                rgba(255,255,255,.008) 3px, rgba(255,255,255,.008) 4px
            );
            pointer-events: none; z-index: 0;
        }

        /* Corner brackets */
        .card-corner {
            position: absolute; width: 22px; height: 22px;
            border-color: rgba(255, 140, 210, 0.55);
            border-style: solid;
        }
        .card-corner.tl { top: 14px; left: 14px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
        .card-corner.tr { top: 14px; right: 14px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
        .card-corner.bl { bottom: 14px; left: 14px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
        .card-corner.br { bottom: 14px; right: 14px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Anime system badge */
        .anime-badge {
            position: relative; z-index: 1;
            display: inline-block;
            font-size: .66em; letter-spacing: .22em; font-weight: 700;
            color: rgba(255, 170, 230, 0.75);
            margin-bottom: 16px;
            text-transform: uppercase;
        }
        .anime-badge::before, .anime-badge::after {
            content: '◈'; margin: 0 8px; color: rgba(200, 140, 255, 0.6);
        }

        /* ── Logo ── */
        .logo-wrap {
            position: relative; z-index: 1;
            display: inline-flex; align-items: center; justify-content: center;
            width: 88px; height: 88px; border-radius: 50%;
            background: rgba(108, 99, 255, 0.1);
            border: 2px solid rgba(200, 140, 255, 0.35);
            box-shadow: 0 0 40px rgba(200, 100, 255, 0.3);
            margin-bottom: 20px;
            animation: pulse 3s ease-in-out infinite;
        }
        .logo-wrap img { width: 58px; height: 58px; filter: drop-shadow(0 0 12px rgba(200,120,255,.6)); }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 40px rgba(200,100,255,.3); }
            50%      { box-shadow: 0 0 65px rgba(200,100,255,.55), 0 0 25px rgba(255,150,220,.2); }
        }

        h1 {
            position: relative; z-index: 1;
            font-size: 2.2em; font-weight: 800; letter-spacing: -.5px;
            background: linear-gradient(135deg, #fff 20%, #d8a8ff 60%, #ffb0d8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .subtitle {
            position: relative; z-index: 1;
            color: rgba(255,255,255,.45); font-size: .88em; margin-bottom: 36px; line-height: 1.7;
        }
        .subtitle .sub2 { font-size: .82em; color: rgba(255,180,230,.35); letter-spacing: .06em; }

        /* ── Decorative divider ── */
        .deco-divider {
            position: relative; z-index: 1;
            display: flex; align-items: center; gap: 10px;
            margin: 0 auto 28px; width: 60%;
            color: rgba(200,140,255,.3); font-size: .72em; letter-spacing: .15em;
        }
        .deco-divider::before, .deco-divider::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200,140,255,.3), transparent);
        }

        /* ── Buttons ── */
        .btn-group { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 14px; }
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 15px 24px; border-radius: 14px; text-decoration: none;
            font-size: .96em; font-weight: 600; transition: all .25s;
            border: none; cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7c6fff, #c060ff, #4a90e2);
            color: #fff;
            box-shadow: 0 8px 28px rgba(150, 80, 255, 0.4);
            border: 1px solid rgba(255,150,220,.2);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(150,80,255,.55); }
        .btn-secondary {
            background: rgba(255,255,255,.07);
            color: rgba(255,255,255,.8);
            border: 1px solid rgba(200,140,255,.2);
        }
        .btn-secondary:hover { background: rgba(200,140,255,.12); transform: translateY(-2px); border-color: rgba(200,140,255,.35); }

        #extraLinks { position: relative; z-index: 1; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 14px; }

        /* ── Feature grid ── */
        .features {
            position: relative; z-index: 1;
            display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin-top: 36px;
        }
        .feature {
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(200,140,255,.1);
            border-radius: 14px; padding: 18px 14px;
            transition: all .2s;
        }
        .feature:hover {
            background: rgba(200,100,255,.08);
            border-color: rgba(200,140,255,.28);
            transform: translateY(-2px);
        }
        .feature i { font-size: 1.4em; color: #c080ff; margin-bottom: 8px; display: block; filter: drop-shadow(0 0 6px rgba(200,100,255,.5)); }
        .feature h3 { font-size: .88em; font-weight: 600; margin-bottom: 4px; color: #e0ccff; }
        .feature p  { font-size: .73em; color: rgba(255,255,255,.35); }

        @media (max-width: 540px) {
            .card { padding: 38px 24px 36px; margin: 16px; border-radius: 22px; }
            h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>

<!-- Adaptive background: image on mobile, video on PC -->
<script>
(function(){
    var mobile = window.matchMedia('(max-width:1023px)').matches ||
        /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
    var el = mobile ? document.createElement('img') : document.createElement('video');
    el.id = 'stc-bg-video';
    if (mobile) {
        el.src = 'https://t.alcy.cc/moemp';
        el.alt = '';
    } else {
        el.autoplay = true; el.muted = true; el.loop = true;
        el.setAttribute('playsinline','');
        var s = document.createElement('source');
        s.src = 'https://t.alcy.cc/acg'; s.type = 'video/mp4';
        el.appendChild(s);
    }
    el.addEventListener('error', function(){
        var ov = document.getElementById('stc-bg-overlay');
        if (ov) ov.style.background =
            'linear-gradient(125deg,#06040f 0%,#180d3a 40%,#0d1b3e 70%,#06040f 100%)';
    });
    document.currentScript.insertAdjacentElement('beforebegin', el);
})();
</script>
<div id="stc-bg-overlay"></div>
<canvas id="stc-sakura"></canvas>

<!-- Card -->
<div class="card">
    <!-- Corner brackets -->
    <div class="card-corner tl"></div>
    <div class="card-corner tr"></div>
    <div class="card-corner bl"></div>
    <div class="card-corner br"></div>

    <div class="anime-badge">Silly Tavern</div>
    <div class="logo-wrap">
        <img src="img/logo.png" alt="SillyTavern">
    </div>
    <h1>SillyTavern</h1>
    <p class="subtitle">
        AI 角色扮演与对话平台<br>
        <span class="sub2">Creative · Immersive · Extensible</span>
    </p>
    <div class="deco-divider">✦ ENTER ✦</div>

    <div class="btn-group">
        <a href="/login"    class="btn btn-primary"><i class="fa-solid fa-right-to-bracket"></i> 登录账号</a>
        <a href="/register" class="btn btn-secondary"><i class="fa-solid fa-user-plus"></i> 注册新账号</a>
    </div>
    <div id="extraLinks"></div>

    <div class="features">
        <div class="feature"><i class="fa-solid fa-comments"></i><h3>AI 对话</h3><p>支持多种 LLM 模型</p></div>
        <div class="feature"><i class="fa-solid fa-masks-theater"></i><h3>角色扮演</h3><p>丰富的角色卡系统</p></div>
        <div class="feature"><i class="fa-solid fa-palette"></i><h3>个性化</h3><p>主题和界面定制</p></div>
        <div class="feature"><i class="fa-solid fa-puzzle-piece"></i><h3>扩展</h3><p>强大的扩展生态</p></div>
    </div>
</div>

<script>
/* ── Sakura particles ── */
(function() {
    const c = document.getElementById('stc-sakura');
    const ctx = c.getContext('2d');
    const colors = ['#ffb7c5','#ffc8d4','#e8c4f8','#c4d8ff','#ffd8f0','#e0b8ff'];
    const petals = [];

    function resize() { c.width = innerWidth; c.height = innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    for (let i = 0; i < 38; i++) {
        petals.push({
            x: Math.random() * c.width, y: Math.random() * c.height,
            r: Math.random() * 5.5 + 2,
            vx: (Math.random() - .5) * .9, vy: Math.random() * 1.1 + .35,
            rot: Math.random() * Math.PI * 2, vr: (Math.random() - .5) * .04,
            a: Math.random() * .45 + .12,
            color: colors[Math.floor(Math.random() * colors.length)],
        });
    }

    function drawPetal(p) {
        ctx.save();
        ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.globalAlpha = p.a;
        ctx.beginPath();
        ctx.moveTo(0, -p.r);
        ctx.bezierCurveTo(p.r * .8, -p.r * .8, p.r, p.r * .5, 0, p.r);
        ctx.bezierCurveTo(-p.r, p.r * .5, -p.r * .8, -p.r * .8, 0, -p.r);
        ctx.fillStyle = p.color; ctx.fill();
        ctx.restore();
    }

    function animate() {
        ctx.clearRect(0, 0, c.width, c.height);
        petals.forEach(p => {
            drawPetal(p);
            p.x += p.vx; p.y += p.vy; p.rot += p.vr;
            p.vx += (Math.random() - .5) * .015;
            p.vx = Math.max(-1.5, Math.min(1.5, p.vx));
            if (p.y > c.height + 12) { p.y = -12; p.x = Math.random() * c.width; }
        });
        requestAnimationFrame(animate);
    }
    animate();
})();

/* ── Extra links ── */
(async function() {
    try {
        const resp = await fetch('/api/stc/public-config/public-pages');
        if (!resp.ok) return;
        const config = await resp.json();
        const container = document.getElementById('extraLinks');
        if (config.enableForum) {
            const a = document.createElement('a'); a.href = '/forum';
            a.className = 'btn btn-secondary';
            a.style.cssText = 'padding:11px 20px;font-size:.86em;border-radius:10px';
            a.innerHTML = '<i class="fa-solid fa-comments"></i> 社区论坛';
            container.appendChild(a);
        }
        if (config.enablePublicCharacters) {
            const a = document.createElement('a'); a.href = '/public-characters';
            a.className = 'btn btn-secondary';
            a.style.cssText = 'padding:11px 20px;font-size:.86em;border-radius:10px';
            a.innerHTML = '<i class="fa-solid fa-masks-theater"></i> 角色卡库';
            container.appendChild(a);
        }
    } catch {}
})();
</script>
</body>
</html>
